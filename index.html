<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ren — Calistenia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000000;
  --card:#1c1c1e;
  --card2:#2c2c2e;
  --t1:#ffffff;
  --t2:rgba(235,235,245,.8);
  --t3:rgba(235,235,245,.45);
  --sep:rgba(84,84,88,.45);
  --primary:#30d158;
  --primary-dim:rgba(48,209,88,.15);
  --blue:#0a84ff;
  --orange:#ff9f0a;
  --red:#ff453a;
  --purple:#bf5af2;
  --cyan:#64d2ff;
  --pink:#ff375f;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --r:16px;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f2f2f7;
    --card:#ffffff;
    --card2:#f2f2f7;
    --t1:#000000;
    --t2:rgba(60,60,67,.8);
    --t3:rgba(60,60,67,.45);
    --sep:rgba(60,60,67,.12);
  }
}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  color:var(--t1);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:420px;margin:0 auto;padding-bottom:calc(24px + var(--safe-bottom));position:relative;z-index:1}

/* Status Bar */
.status-spacer{height:calc(54px + var(--safe-top))}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--primary-dim)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

#app{animation:fadeIn 0.4s ease-out}

/* Header */
.page-header{
  padding:8px 20px 16px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.page-header h1{font-size:36px;font-weight:700;letter-spacing:-.6px;line-height:1.1}
.page-header .sub{font-size:13px;color:var(--t3);margin-top:4px;font-weight:500}

/* Streak Pill */
.streak-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--primary-dim);color:var(--primary);
  font-size:13px;font-weight:600;
  padding:6px 14px;border-radius:20px;
  white-space:nowrap;
}
.streak-pill svg{width:14px;height:14px}

/* Header Buttons */
.header-btn{
  background:var(--card);border:none;border-radius:10px;
  padding:8px 10px;font-size:16px;cursor:pointer;
  transition:transform .15s;
}
.header-btn:active{transform:scale(0.9)}

/* Hero Card */
.hero-card{
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  border-radius:24px;margin:0 16px 16px;
  padding:20px 24px;
  position:relative;overflow:hidden;
  animation:fadeInUp 0.5s ease-out 0.1s both;
}
.hero-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--cyan));
}
.hero-greeting{font-size:13px;font-weight:500;color:var(--t3);margin-bottom:4px}
.hero-group{font-size:32px;font-weight:700;letter-spacing:-0.5px;line-height:1.2}
.hero-next{font-size:12px;color:var(--t3);margin-top:4px}
.hero-stats{display:flex;gap:0;margin-top:16px;padding-top:16px;border-top:1px solid var(--sep)}
.hero-stat{flex:1;text-align:center}
.hero-stat-val{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.hero-stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.hero-stat+.hero-stat{border-left:1px solid var(--sep)}

/* Today Focus - Single Exercise */
.today-focus{
  background:var(--card);border-radius:var(--r);margin:0 16px 12px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  animation:fadeInUp 0.4s ease-out 0.2s both;
  cursor:pointer;transition:transform .15s;
}
.today-focus:active{transform:scale(0.98)}
.tf-icon{width:44px;height:44px;border-radius:12px;background:var(--primary-dim);display:flex;align-items:center;justify-content:center;font-size:22px}
.tf-info{flex:1;margin-left:14px}
.tf-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.tf-ex{font-size:17px;font-weight:600;margin-top:2px}
.tf-sets{font-size:12px;color:var(--t3);margin-top:2px}
.tf-arrow{color:var(--t3)}

/* Quick Actions */
.quick-actions{
  display:flex;gap:10px;padding:0 16px;margin-bottom:16px;
  animation:fadeInUp 0.4s ease-out 0.3s both;
}
.qa-btn{
  flex:1;background:var(--card);border:none;border-radius:var(--r);
  padding:14px 12px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:all .2s;
}
.qa-btn:active{transform:scale(0.96);background:var(--card2)}
.qa-icon{font-size:22px}
.qa-label{font-size:11px;font-weight:500;color:var(--t2)}

/* Section Label */
.section-label{
  font-size:13px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.5px;
  padding:0 16px;margin-bottom:10px;margin-top:8px;
}

/* Widget Grid */
.widget-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:0 16px;margin-bottom:12px;
}
.widget{
  background:var(--card);border-radius:var(--r);
  padding:14px 10px;text-align:center;
  cursor:pointer;transition:all .2s;
  animation:fadeInUp 0.4s ease-out calc(0.4s + var(--i) * 0.05s) both;
}
.widget:active{transform:scale(0.95);background:var(--card2)}
.w-icon{font-size:24px;margin-bottom:6px}
.w-label{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase}
.w-value{font-size:20px;font-weight:700;margin-top:4px}
.w-sub{font-size:9px;color:var(--t3);margin-top:2px}

/* Mini Stats Row */
.mini-stats{
  display:flex;gap:8px;padding:0 16px;margin-bottom:16px;
  animation:fadeInUp 0.4s ease-out 0.6s both;
}
.ms-card{
  flex:1;background:var(--card);border-radius:var(--r);
  padding:12px;display:flex;align-items:center;gap:10px;
}
.ms-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.ms-info{flex:1}
.ms-value{font-size:18px;font-weight:700}
.ms-label{font-size:10px;color:var(--t3);margin-top:1px}

/* AI Widget - Full Width */
.ai-widget{
  background:linear-gradient(135deg,rgba(48,209,88,0.15) 0%,rgba(48,209,88,0.05) 100%);
  border:1px solid rgba(48,209,88,0.2);
  border-radius:var(--r);margin:0 16px 16px;
  padding:16px;cursor:pointer;
  animation:fadeInUp 0.4s ease-out 0.7s both;
  transition:all .2s;
}
.ai-widget:active{transform:scale(0.98)}
.ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ai-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--primary)}
.ai-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:pulse 2s infinite}
.ai-title{font-size:15px;font-weight:600}
.ai-preview{font-size:13px;color:var(--t2);line-height:1.4}
.ai-suggestions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.ai-sug{background:var(--card);padding:6px 10px;border-radius:8px;font-size:11px;color:var(--t2)}

/* Week Strip */
.week-strip{
  display:flex;justify-content:space-between;padding:0 16px;margin-bottom:20px;
  animation:fadeInUp 0.4s ease-out 0.8s both;
}
.wd{flex:1;text-align:center}
.wd-label{font-size:10px;font-weight:500;color:var(--t3);margin-bottom:6px}
.wd-bubble{
  width:36px;height:36px;border-radius:50%;margin:0 auto;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;
  background:var(--card);color:var(--t3);
  position:relative;overflow:hidden;
  transition:transform .15s;
}
.wd-bubble:hover{transform:scale(1.1)}
.wd-bubble.today{border:2px solid var(--primary)}
.wd-bubble.today .wd-num{color:var(--primary)}
.wd-bubble.has-workout{background:var(--primary);color:#fff}
.wd-bubble.rest{background:var(--primary-dim);color:var(--primary)}
.wd-bars{position:absolute;bottom:0;left:0;right:0;height:3px;display:flex}
.wd-bars span{flex:1}

/* Bottom Nav */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:420px;
  background:rgba(28,28,30,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--sep);
  display:flex;justify-content:space-around;padding:8px 0 calc(8px + var(--safe-bottom));
  z-index:100;
}
@media(prefers-color-scheme:light){
  .bottom-nav{background:rgba(255,255,255,0.95)}
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 16px;cursor:pointer;
  transition:transform .15s;
}
.bn-item:active{transform:scale(0.9)}
.bn-icon{font-size:22px}
.bn-label{font-size:10px;color:var(--t3);font-weight:500}
.bn-item.active .bn-icon{color:var(--primary)}
.bn-item.active .bn-label{color:var(--primary)}

/* FAB */
.fab{
  position:fixed;bottom:calc(70px + var(--safe-bottom));
  right:calc(50% - 190px);
  background:var(--primary);color:#000;
  border:none;border-radius:28px;
  padding:16px 24px;font-size:15px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(48,209,88,.4);
  cursor:pointer;z-index:90;
  animation:fadeInUp 0.4s ease-out 0.3s both;
  transition:transform .1s, box-shadow .2s;
}
.fab:hover{box-shadow:0 6px 24px rgba(48,209,88,.5)}
.fab:active{transform:scale(0.95)}
.fab svg{width:18px;height:18px}

/* Modal System */
.modal-mask{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s;
}
.modal-sheet{
  background:var(--card);
  border-radius:24px 24px 0 0;
  width:100%;max-width:420px;max-height:92vh;
  overflow-y:auto;
  padding:0 0 calc(20px + var(--safe-bottom));
  box-shadow:0 -10px 40px rgba(0,0,0,.4);
  animation:slideUp .35s cubic-bezier(.32,1,.32,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--sep);border-radius:2px;margin:12px auto 0}
.modal-header-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;position:sticky;top:0;
  background:var(--card);z-index:2;border-bottom:1px solid var(--sep);
}
.modal-title{font-size:18px;font-weight:700}
.modal-close{
  width:28px;height:28px;border-radius:50%;
  background:var(--card2);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--t2);
}
.modal-body{padding:16px 20px}

/* Form Elements */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field input,.field select{
  width:100%;background:var(--card2);border:1px solid var(--sep);
  border-radius:12px;padding:12px 14px;
  font-size:15px;color:var(--t1);outline:none;
  -webkit-appearance:none;appearance:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--primary)}
.field select option{background:var(--card)}

.seg{display:flex;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:14px}
.seg-btn{
  flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;
  color:var(--t3);border-radius:8px;cursor:pointer;border:none;background:none;
  transition:all .18s;
}
.seg-btn.active{background:var(--card);color:var(--t1);font-weight:600}

.btn-primary{
  width:100%;padding:16px;background:var(--primary);color:#000;
  border:none;border-radius:14px;font-size:16px;font-weight:600;
  cursor:pointer;transition:opacity .15s;
}
.btn-primary:active{opacity:.8}

/* Exercise List */
.ex-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ex-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.ex-name{font-size:15px;font-weight:600}
.ex-detail{font-size:12px;color:var(--t3);margin-top:2px}
.ex-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-push{background:rgba(10,132,255,.15);color:var(--blue)}
.badge-pull{background:rgba(48,209,88,.15);color:var(--primary)}
.badge-legs{background:rgba(255,159,10,.15);color:var(--orange)}
.badge-core{background:rgba(191,90,242,.15);color:var(--purple)}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:16px;font-weight:600}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--card2);border:none;cursor:pointer;
  color:var(--t2);font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{
  aspect-ratio:1;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:12px;font-weight:500;color:var(--t3);
  position:relative;cursor:pointer;
}
.cal-cell:hover{background:var(--card2)}
.cal-cell.today{background:var(--primary-dim);color:var(--primary);font-weight:700}
.cal-cell.workout{background:var(--card);color:var(--t1);font-weight:600}
.cal-bars{position:absolute;bottom:2px;left:2px;right:2px;height:3px;display:flex;gap:1px}
.cal-bars span{flex:1;border-radius:1px}

/* PR List */
.pr-list{display:flex;flex-direction:column;gap:8px}
.pr-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.pr-name{font-size:15px;font-weight:600}
.pr-val{font-size:18px;font-weight:700;color:var(--orange)}

/* History */
.hist-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;margin-bottom:8px;
}
.hist-date{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px}
.hist-exercises{font-size:13px;color:var(--t2)}

/* Muscle Selector */
.muscle-selector{display:flex;gap:8px;margin-top:8px}
.muscle-option{
  flex:1;text-align:center;padding:10px 0;border-radius:10px;
  font-size:12px;font-weight:600;background:var(--card2);
  color:var(--t3);cursor:pointer;transition:all .15s;
}
.muscle-option.active{background:var(--primary);color:#000}

/* Toast */
.toast{
  position:fixed;top:calc(60px + var(--safe-top));left:50%;
  transform:translateX(-50%) translateY(-10px);
  padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;
  z-index:9999;opacity:0;transition:all .25s;pointer-events:none;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Templates */
.tpl-list{display:flex;flex-direction:column;gap:8px}
.tpl-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.tpl-name{font-size:15px;font-weight:600}
.tpl-meta{font-size:12px;color:var(--t3)}

/* Chart */
.chart-container{height:180px;position:relative}

/* Loading Skeleton */
@keyframes skeleton-pulse{0%,100%{opacity:0.4}50%{opacity:0.7}}
.skeleton{background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);background-size:200% 100%;animation:skeleton-pulse 1.5s ease-in-out infinite;border-radius:8px}
.skeleton-text{height:14px;width:60%}
.skeleton-title{height:20px;width:80%}
.skeleton-box{height:60px;border-radius:12px}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* Icons (simulated with emoji/svg) */
.ico-push{color:var(--blue)}
.ico-pull{color:var(--primary)}
.ico-legs{color:var(--orange)}
.ico-core{color:var(--purple)}
</style>
</head>
<body>
<div id="app">
  <div class="status-spacer"></div>
  
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>Ren</h1>
      <div class="sub" id="hdr-date"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="header-btn" onclick="exportToFile()" title="Exportar">📤</button>
      <button class="header-btn" onclick="document.getElementById('importFile').click()" title="Importar">📥</button>
      <div id="streak-pill" class="streak-pill">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C9.5 6 8 8.5 8 11c0 2.2 1.8 4 4 4s4-1.8 4-4c0-2.5-1.5-5-4-9zM12 13c-1.1 0-2-.9-2-2 0-1.2.7-2.5 2-4 1.3 1.5 2 2.8 2 4 0 1.1-.9 2-2 2z"/></svg>
        <span id="streak-text">0 dias</span>
      </div>
    </div>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFromFile(event)">

  <!-- Hero Card -->
  <div class="hero-card" id="hero-card" onclick="openTodayModal()">
    <div class="hero-greeting" id="hero-greeting">Bom treino</div>
    <div class="hero-group" id="hero-group">Lance seu treino</div>
    <div class="hero-next">Próximo: <span id="hero-next">—</span></div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-val" style="color:var(--primary)" id="hero-vol">0</div>
        <div class="hero-stat-lbl">Reps hoje</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val" style="color:var(--orange)" id="hero-pr">—</div>
        <div class="hero-stat-lbl">PR grupo</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val" style="color:var(--cyan)" id="hero-streak">0</div>
        <div class="hero-stat-lbl">Streak</div>
      </div>
    </div>
  </div>

  <!-- Today's Focus -->
  <div class="today-focus" id="today-focus" onclick="openAddModal()">
    <div class="tf-icon">🏋️</div>
    <div class="tf-info">
      <div class="tf-label">Foco de hoje</div>
      <div class="tf-ex" id="tf-ex">Toque para registrar</div>
      <div class="tf-sets" id="tf-sets"></div>
    </div>
    <div class="tf-arrow">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>

  <!-- Week Strip -->
  <div class="week-strip" id="week-strip"></div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="qa-btn" onclick="openAddModal()">
      <span class="qa-icon">➕</span>
      <span class="qa-label">Registrar</span>
    </button>
    <button class="qa-btn" onclick="openAIModal()">
      <span class="qa-icon">🧠</span>
      <span class="qa-label">Coach IA</span>
    </button>
    <button class="qa-btn" onclick="openCalendarModal()">
      <span class="qa-icon">📅</span>
      <span class="qa-label">Calendário</span>
    </button>
  </div>

  <!-- AI Widget -->
  <div class="ai-widget" onclick="openAIModal()">
    <div class="ai-header">
      <div class="ai-badge">
        <span class="ai-badge-dot"></span>
        Coach Inteligente
      </div>
    </div>
    <div class="ai-preview" id="ai-preview">Calculando...</div>

<script>
// ================================================================
// DATA & STATE
// ================================================================
const MUSCLE_MAP={
  'Flexão (Push-up)':'push','Flexão diamante':'push','Pike push-up':'push','Handstand push-up':'push','Paralela (Dip)':'push','Ring push-up':'push','Archer push-up':'push',
  'Barra fixa (Pull-up)':'pull','Barra supinada (Chin-up)':'pull','Muscle-up':'pull','Australian pull-up':'pull','L-sit pull-up':'pull','Archer pull-up':'pull','Typewriter pull-up':'pull',
  'Agachamento (Squat)':'legs','Pistol squat':'legs','Afundo (Lunge)':'legs','Nordic curl':'legs','Elevação de quadril':'legs','Bulgarian split squat':'legs',
  'Prancha (Plank)':'core','L-sit':'core','Hanging leg raise':'core','Dragon flag':'core','Ab wheel rollout':'core','Hollow body hold':'core','Toes to bar':'core'
};
const GROUP_NAMES={pull:'Pull 🦾',push:'Push 💪',legs:'Legs 🦵',core:'Core 🧘',rest:'Descanso 😴'};
const GROUP_COLORS={pull:'#30d158',push:'#0a84ff',legs:'#ff9f0a',core:'#bf5af2'};
const MUSCLE_LABEL={push:'Push',pull:'Pull',legs:'Legs',core:'Core'};

let S={workouts:[],restDays:[],templates:[],todayExercises:[]};
let sessionType='workout', countType='reps';

function load(){try{const s=localStorage.getItem('ren_v1');if(s)S=JSON.parse(s);}catch(e){}}
function save(){localStorage.setItem('ren_v1',JSON.stringify(S));}
load();

function today(){return new Date().toISOString().split('T')[0]}
document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});

// ================================================================
// TOAST
// ================================================================
function toast(msg,color='#30d158'){const el=document.getElementById('toast');el.textContent=msg;el.style.background=color;el.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}

// ================================================================
// MODAL SYSTEM
// ================================================================
function createModal(id, title, bodyHtml, opts={}) {
  let el = document.getElementById(id);
  if (el) el.remove();
  el = document.createElement('div');
  el.id = id;
  el.className = 'modal-mask';
  el.addEventListener('click', e => { if(e.target === el) el.remove(); });
  
  const sheetClass = opts.center ? 'modal-sheet center' : 'modal-sheet';
  el.innerHTML = `
    <div class="${sheetClass}">
      ${opts.center ? '' : '<div class="modal-handle"></div>'}
      <div class="modal-header-bar">
        <span class="modal-title">${title}</span>
        <button class="modal-close" onclick="document.getElementById('${id}').remove()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="${id}-body">${bodyHtml}</div>
    </div>
  `;
  document.body.appendChild(el);
  return el;
}

// ================================================================
// TODAY MODAL
// ================================================================
function openTodayModal() {
  const t = today();
  const savedToday = S.workouts.find(w=>w.date===t);
  const allToday = [...S.todayExercises, ...(savedToday ? savedToday.exercises : [])];
  
  if (!allToday.length) {
    createModal('todayModal', 'Treino de Hoje', `
      <div class="empty-state">
        <div class="empty-icon">🏋️</div>
        <div class="empty-title">Nenhum exercício hoje</div>
        <div class="empty-sub">Toque em Registrar para começar</div>
        <button class="btn-primary" style="margin-top:16px" onclick="document.getElementById('todayModal').remove();openAddModal()">+ Registrar</button>
      </div>
    `);
    return;
  }
  
  let html = '<div class="ex-list">';
  const grouped = {};
  allToday.forEach(e => {
    if (!grouped[e.ex]) grouped[e.ex] = {sets:0, reps:0, muscle:e.muscle, notes:e.notes};
    grouped[e.ex].sets += e.sets;
    grouped[e.ex].reps += e.reps;
  });
  
  Object.entries(grouped).forEach(([ex,data])=>{
    html += `<div class="ex-item">
      <div>
        <div class="ex-name">${ex}</div>
        <div class="ex-detail">${data.sets} séries × ${data.reps} reps${data.notes ? ' · '+data.notes : ''}</div>
      </div>
      <span class="ex-badge badge-${data.muscle}">${MUSCLE_LABEL[data.muscle]}</span>
    </div>`;
  });
  html += '</div>';
  
  const total = allToday.reduce((a,e)=>a+(e.isTime?0:e.sets*e.reps),0);
  html += `<div style="text-align:center;padding:16px;background:var(--card2);border-radius:12px;margin-top:12px">
    <div style="font-size:28px;font-weight:700;color:var(--primary)">${total}</div>
    <div style="font-size:12px;color:var(--t3)">reps totais hoje</div>
  </div>`;
  
  createModal('todayModal', 'Treino de Hoje', html);
}

// ================================================================
// ADD MODAL
// ================================================================
function openAddModal() {
  const todayStr = today();
  createModal('addModal', 'Registrar Exercício', `
    <div class="field"><label>Data</label><input type="date" id="workout-date" value="${todayStr}"></div>
    <div class="field"><label>Tipo</label>
      <div class="seg" id="session-seg">
        <button class="seg-btn active" onclick="setSession('workout',this)">Treino</button>
        <button class="seg-btn" onclick="setSession('rest',this)">Descanso</button>
      </div>
    </div>
    <div id="workout-fields">
      <div class="field"><label>Exercício</label>
        <select id="ex-select">
          <option value="">Selecionar...</option>
          <optgroup label="Push 💪">
            <option>Flexão (Push-up)</option><option>Flexão diamante</option><option>Pike push-up</option>
            <option>Handstand push-up</option><option>Paralela (Dip)</option><option>Ring push-up</option><option>Archer push-up</option>
          </optgroup>
          <optgroup label="Pull 🦾">
            <option>Barra fixa (Pull-up)</option><option>Barra supinada (Chin-up)</option><option>Muscle-up</option>
            <option>Australian pull-up</option><option>L-sit pull-up</option><option>Archer pull-up</option><option>Typewriter pull-up</option>
          </optgroup>
          <optgroup label="Legs 🦵">
            <option>Agachamento (Squat)</option><option>Pistol squat</option><option>Afundo (Lunge)</option>
            <option>Nordic curl</option><option>Elevação de quadril</option><option>Bulgarian split squat</option>
          </optgroup>
          <optgroup label="Core 🧘">
            <option>Prancha (Plank)</option><option>L-sit</option><option>Hanging leg raise</option>
            <option>Dragon flag</option><option>Ab wheel rollout</option><option>Hollow body hold</option><option>Toes to bar</option>
          </optgroup>
        </select>
      </div>
      <div class="field"><label>Tipo de contagem</label>
        <div class="seg" id="count-seg">
          <button class="seg-btn active" onclick="setCountType('reps',this)">Reps</button>
          <button class="seg-btn" onclick="setCountType('time',this)">Tempo (s)</button>
        </div>
      </div>
      <div class="field"><label>Séries × Reps</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="sets-input" min="1" max="30" value="3" style="flex:1;text-align:center;font-size:18px;font-weight:600">
          <span style="color:var(--t3)">×</span>
          <input type="number" id="reps-input" min="1" max="300" value="10" style="flex:1;text-align:center;font-size:18px;font-weight:600">
          <span id="reps-unit" style="color:var(--t3)">reps</span>
        </div>
      </div>
      <div class="field"><label>Grupo muscular</label>
        <div class="muscle-selector" id="add-muscle-selector">
          <div class="muscle-option" data-muscle="push" onclick="selectMuscle('add-muscle-selector','push')">Push</div>
          <div class="muscle-option" data-muscle="pull" onclick="selectMuscle('add-muscle-selector','pull')">Pull</div>
          <div class="muscle-option" data-muscle="legs" onclick="selectMuscle('add-muscle-selector','legs')">Legs</div>
          <div class="muscle-option active" data-muscle="core" onclick="selectMuscle('add-muscle-selector','core')">Core</div>
        </div>
      </div>
      <button class="btn-primary" onclick="addExercise()">+ Adicionar</button>
    </div>
    <div id="rest-fields" style="display:none">
      <div style="text-align:center;padding:32px">
        <div style="font-size:48px;margin-bottom:12px">😴</div>
        <div style="font-size:17px;font-weight:600">Dia de descanso</div>
        <div style="font-size:13px;color:var(--t3);margin-top:6px">Recuperação é parte do treino</div>
      </div>
      <button class="btn-primary" onclick="saveRestDay()">Salvar</button>
    </div>
  `);
  
  sessionType = 'workout';
  countType = 'reps';
  document.getElementById('ex-select').addEventListener('change', function() {
    const selected = this.value;
    const muscle = MUSCLE_MAP[selected] || 'core';
    selectMuscle('add-muscle-selector', muscle);
  });
}

function selectMuscle(containerId, muscle) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.muscle-option').forEach(el=>el.classList.remove('active'));
  container.querySelector(`[data-muscle="${muscle}"]`).classList.add('active');
}

function setSession(type, btn) {
  sessionType = type;
  document.querySelectorAll('#session-seg .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('workout-fields').style.display = type==='workout' ? 'block' : 'none';
  document.getElementById('rest-fields').style.display = type==='rest' ? 'block' : 'none';
}

function setCountType(type, btn) {
  countType = type;
  document.querySelectorAll('#count-seg .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('reps-unit').textContent = type === 'time' ? 'seg' : 'reps';
  document.getElementById('reps-input').value = type === 'time' ? '30' : '10';
}

function addExercise() {
  const sel = document.getElementById('ex-select').value;
  const ex = sel || 'Exercício';
  const sets = parseInt(document.getElementById('sets-input').value)||1;
  const reps = parseInt(document.getElementById('reps-input').value)||1;
  const muscleSelector = document.getElementById('add-muscle-selector');
  const muscle = [...muscleSelector.querySelectorAll('.active')][0]?.dataset.muscle || MUSCLE_MAP[ex] || 'core';
  if (!sel) { toast('Selecione um exercício','#ff453a'); return; }
  const entry = {ex,sets,reps,isTime:countType==='time',notes:'',muscle,ts:Date.now(),date:today()};
  S.todayExercises.push(entry);
  if (!entry.isTime) checkPR(ex, reps);
  save(); refresh(); document.getElementById('addModal').remove();
  toast('Exercício adicionado! ✓','#30d158');
}

function checkPR(ex, reps) {
  const all = S.workouts.flatMap(w=>w.exercises).filter(e=>e.ex===ex);
  const max = all.length ? Math.max(...all.map(e=>e.reps)) : 0;
  if (reps > max && all.length > 0) toast('🏆 Novo PR! '+reps+' reps','#ff9f0a');
}

function saveRestDay() {
  const date = document.getElementById('workout-date').value || today();
  S.restDays = S.restDays.filter(r=>r.date!==date);
  S.restDays.push({date, notes:''});
  save(); refresh(); document.getElementById('addModal').remove();
  toast('Descanso salvo! 😴','#30d158');
}

// ================================================================
// AI ANALYSIS
// ================================================================
function getStreak(){
  const all=new Set([...S.workouts.map(w=>w.date),...S.restDays.map(r=>r.date)]);
  let streak=0; const d=new Date();
  for(let i=0;i<365;i++){
    const s=d.toISOString().split('T')[0];
    if(all.has(s)) streak++; else if(i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function calculateDetailedStats() {
  const stats = {totalWorkouts:S.workouts.length,workoutsThisWeek:0,avgVolumePerWorkout:0,currentStreak:getStreak()};
  if(!stats.totalWorkouts) return stats;
  const now=new Date(); const ws=new Date(now); ws.setDate(now.getDate()-now.getDay());
  stats.workoutsThisWeek=S.workouts.filter(w=>new Date(w.date+'T12:00:00')>=ws).length;
  const totalVolume=S.workouts.reduce((s,w)=>s+w.exercises.reduce((a,e)=>a+(e.isTime?0:e.sets*e.reps),0),0);
  stats.avgVolumePerWorkout=totalVolume/stats.totalWorkouts;
  
  const mc={push:0,pull:0,legs:0,core:0};
  S.workouts.forEach(w=>w.exercises.forEach(e=>{if(e.muscle)mc[e.muscle]=(mc[e.muscle]||0)+1;}));
  const sorted=Object.entries(mc).sort((a,b)=>b[1]-a[1]);
  if(sorted.length)stats.mostTrainedMuscle=sorted[0][0];
  
  return stats;
}

function generateAIAnalysis() {
  const stats = calculateDetailedStats();
  if (!stats.totalWorkouts) {
    return {
      message:"👋 Bem-vindo! Comece registrando seu primeiro treino.",
      suggestions:["Registre 3x por semana","Foque em push, pull e legs"]
    };
  }
  let msg = "";
  if (stats.workoutsThisWeek >= 3) msg = `🔥 ${stats.workoutsThisWeek}x esta semana!`;
  else if (stats.workoutsThisWeek > 0) msg = `📊 ${stats.workoutsThisWeek}x essa semana`;
  else msg = "⚠️ Semana zerada";
  if (stats.currentStreak > 0) msg += ` · 🔥 ${stats.currentStreak} dias`;
  return {message:msg, suggestions:[]};
}

function renderAI() {
  const analysis = generateAIAnalysis();
  document.getElementById('ai-preview').textContent = analysis.message;
  const sugContainer = document.getElementById('ai-suggestions');
  if (analysis.suggestions.length) {
    sugContainer.innerHTML = analysis.suggestions.map(s=>`<span class="ai-sug">${s}</span>`).join('');
  } else {
    sugContainer.innerHTML = '';
  }
}

// ================================================================
// WIDGETS & UPDATES
// ================================================================
function detectTodayGroup() {
  const t=today(); const sources=[...S.todayExercises];
  const saved=S.workouts.find(w=>w.date===t); if(saved) sources.push(...saved.exercises);
  if(!sources.length) return null;
  const cnt={};
  sources.forEach(e=>{cnt[e.muscle]=(cnt[e.muscle]||0)+(e.isTime?0:e.sets*e.reps);});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0];
}

function guessNextGroup() {
  const recent=S.workouts.slice(-3).map(w=>{
    const cnt={};w.exercises.forEach(e=>{cnt[e.muscle]=(cnt[e.muscle]||0)+1;});
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0];
  }).filter(Boolean);
  const lastGroup=recent[recent.length-1];
  const cycle=['pull','push','legs','core'];
  if(!lastGroup) return 'pull';
  const idx=cycle.indexOf(lastGroup);
  return cycle[(idx+1)%cycle.length];
}

function getPRForGroup(group) {
  let max=0;
  S.workouts.flatMap(w=>w.exercises).forEach(e=>{if(e.muscle===group&&!e.isTime&&e.reps>max)max=e.reps;});
  return max?max+'r':'—';
}

function refresh() {
  const streak = getStreak();
  document.getElementById('streak-text').textContent = streak + ' dias';
  document.getElementById('hero-streak').textContent = streak;
  
  const t = today();
  let vol = S.todayExercises.reduce((a,e)=>e.isTime?a:a+e.sets*e.reps,0);
  const saved = S.workouts.find(w=>w.date===t);
  if(saved) vol += saved.exercises.reduce((a,e)=>e.isTime?a:a+e.sets*e.reps,0);
  document.getElementById('hero-vol').textContent = vol;
  
  const group = detectTodayGroup();
  const nextGroup = guessNextGroup();
  const color = GROUP_COLORS[group||'pull'];
  
  document.getElementById('hero-group').textContent = group ? GROUP_NAMES[group] : 'Lance seu treino';
  document.getElementById('hero-group').style.color = color;
  document.getElementById('hero-next').textContent = GROUP_NAMES[nextGroup];
  document.getElementById('hero-pr').textContent = group ? getPRForGroup(group) : '—';
  
  const hour = new Date().getHours();
  const greetings = ['Bom dia','Boa tarde','Boa noite'];
  const greeting = hour < 12 ? greetings[0] : hour < 18 ? greetings[1] : greetings[2];
  document.getElementById('hero-greeting').textContent = greeting;
  
  // Today's focus
  const tf = document.getElementById('tf-ex');
  if (S.todayExercises.length > 0) {
    const lastEx = S.todayExercises[S.todayExercises.length-1].ex;
    const lastSets = S.todayExercises[S.todayExercises.length-1].sets;
    const lastReps = S.todayExercises[S.todayExercises.length-1].reps;
    tf.textContent = lastEx;
    document.getElementById('tf-sets').textContent = `${lastSets} × ${lastReps}`;
  } else if (saved && saved.exercises.length > 0) {
    const lastEx = saved.exercises[saved.exercises.length-1].ex;
    const lastSets = saved.exercises[saved.exercises.length-1].sets;
    const lastReps = saved.exercises[saved.exercises.length-1].reps;
    tf.textContent = lastEx;
    document.getElementById('tf-sets').textContent = `${lastSets} × ${lastReps}`;
  } else {
    tf.textContent = 'Toque para registrar';
    document.getElementById('tf-sets').textContent = '';
  }
  
  // Mini stats
  document.getElementById('ms-total').textContent = S.workouts.length;
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate()-now.getDay());
  document.getElementById('ms-week').textContent = S.workouts.filter(w=>new Date(w.date+'T12:00:00')>=ws).length;
  const mo = now.toISOString().slice(0,7);
  const mReps = S.workouts.filter(w=>w.date.startsWith(mo)).reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+(e.isTime?0:e.sets*e.reps),0),0);
  document.getElementById('ms-month').textContent = mReps;
  
  // Widgets
  const prMap={};
  S.workouts.flatMap(w=>w.exercises).forEach(e=>{if(!prMap[e.ex]||e.reps>prMap[e.ex])prMap[e.ex]=e.reps;});
  document.getElementById('w-pr').textContent = Object.keys(prMap).length;
  
  const wData=Array(7).fill(0);
  const ws2=new Date(now); ws2.setDate(now.getDate()-now.getDay());
  S.workouts.forEach(w=>{const d=new Date(w.date+'T12:00:00');if(d>=ws2)wData[d.getDay()]+=w.exercises.reduce((a,e)=>a+(e.isTime?0:e.sets*e.reps),0);});
  document.getElementById('w-chart').textContent = wData.reduce((a,b)=>a+b,0);
  
  const volMap={};
  S.workouts.flatMap(w=>w.exercises).forEach(e=>{volMap[e.ex]=(volMap[e.ex]||0)+(e.isTime?0:e.sets*e.reps);});
  const topEx = Object.entries(volMap).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('w-vol').textContent = topEx ? topEx[1] : '—';
  
  document.getElementById('w-tpl').textContent = S.templates.length;
  
  // Histórico
  const histCount = S.workouts.length + S.restDays.length;
  document.getElementById('w-hist').textContent = histCount;
  
  renderWeekStrip();
  renderAI();
}

function renderWeekStrip() {
  const days=['D','S','T','Q','Q','S','S'];
  const now=new Date(); const weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const strip=document.getElementById('week-strip');
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(weekStart); d.setDate(weekStart.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const w=S.workouts.find(x=>x.date===ds); const r=S.restDays.find(x=>x.date===ds);
    const isToday=ds===today();
    let bubble='wd-bubble';
    if(w) bubble+=' has-workout';
    else if(r) bubble+=' rest';
    if(isToday) bubble+=' today';
    html+=`<div class="wd"><div class="${bubble}">${days[i]}</div></div>`;
  }
  strip.innerHTML=html;
}

let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

function changeCal(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
}

function renderCal() {
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-title').textContent = months[calMonth] + ' ' + calYear;
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prefix = calYear+'-'+String(calMonth+1).padStart(2,'0');
  const todayStr = today();
  
  let grid = '';
  for (let i=0; i<firstDow; i++) grid += '<div></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const ds = prefix+'-'+String(d).padStart(2,'0');
    const w=S.workouts.find(x=>x.date===ds);
    const r=S.restDays.find(x=>x.date===ds);
    let cls = 'cal-cell';
    if (ds === todayStr) cls += ' today';
    if (w) cls += ' workout';
    grid += `<div class="${cls}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = grid;
}

function renderHistoryInModal() {
  const el = document.getElementById('history-modal-list');
  if (!el) return;
  const wMap={},rMap={};
  S.workouts.forEach(w=>wMap[w.date]=w);
  S.restDays.forEach(r=>rMap[r.date]=r);
  const dates=[...new Set([...Object.keys(wMap),...Object.keys(rMap)])].sort().reverse();
  if (!dates.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-title">Nenhum registro ainda</div></div>'; return; }
  
  el.innerHTML = dates.slice(0,40).map(date=>{
    const d=new Date(date+'T12:00:00');
    const lbl=d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    if(rMap[date]&&!wMap[date]){
      return `<div class="hist-item" style="animation:fadeInUp 0.3s ease-out">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="hist-date">${lbl}</span>
          <button style="background:none;border:none;font-size:16px;cursor:pointer" onclick="deleteWorkout('${date}')">🗑️</button>
        </div>
        <div style="font-size:13px;color:var(--t3)">😴 Descanso</div>
      </div>`;
    }
    const w=wMap[date];
    const vol=w.exercises.reduce((a,e)=>a+(e.isTime?0:e.sets*e.reps),0);
    const muscles=[...new Set(w.exercises.map(e=>e.muscle))];
    const exList=[...new Set(w.exercises.map(e=>e.ex))];
    return `<div class="hist-item" style="animation:fadeInUp 0.3s ease-out">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="hist-date">${lbl}</span>
        <div style="display:flex;gap:4px">
          <button style="background:var(--card);border:none;padding:6px 10px;border-radius:8px;font-size:14px;cursor:pointer" onclick="openEditWorkout('${date}')">✏️</button>
          <button style="background:rgba(255,69,58,.1);border:none;padding:6px 10px;border-radius:8px;font-size:14px;cursor:pointer" onclick="deleteWorkout('${date}')">🗑️</button>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0">${muscles.map(m=>`<span class="ex-badge badge-${m}">${MUSCLE_LABEL[m]}</span>`).join('')}</div>
      <div style="font-size:12px;color:var(--t3)">${exList.slice(0,4).join(', ')}${exList.length>4?'...':''}</div>
      <div style="font-size:11px;color:var(--primary);margin-top:4px">${vol} reps</div>
    </div>`;
  }).join('');
}

function deleteWorkout(date) {
  if(!confirm(`Apagar registro de ${date}?`)) return;
  S.workouts=S.workouts.filter(w=>w.date!==date);
  S.restDays=S.restDays.filter(r=>r.date!==date);
  save(); refresh(); renderHistoryInModal(); renderWeekStrip(); toast('Registro removido','#ff453a');
}

function saveTemplate() {
  const name = document.getElementById('tpl-name-input').value.trim();
  if (!name) { toast('Digite um nome','#ff453a'); return; }
  const exercises = S.todayExercises.length ? S.todayExercises : (S.workouts.length ? S.workouts[S.workouts.length-1].exercises : []);
  if (!exercises.length) { toast('Adicione exercícios primeiro.','#ff453a'); return; }
  S.templates.push({name, exercises:[...exercises]});
  save(); renderTemplatesInModal(); document.getElementById('tpl-name-input').value = ''; refresh();
  toast('Template salvo!','#30d158');
}

function useTemplate(idx) {
  S.todayExercises = [...S.templates[idx].exercises.map(e=>({...e,ts:Date.now()}))];
  save(); refresh(); document.getElementById('templatesModal').remove();
  toast(`Template "${S.templates[idx].name}" adicionado!`,'#30d158');
}

function useTemplateRetroactive(idx) {
  const selectedDate = document.getElementById('template-date-input').value || today();
  if (!selectedDate) { toast('Selecione uma data','#ff453a'); return; }
  const template = S.templates[idx];
  const exercises = template.exercises.map(e=>({...e,ts:Date.now(),date:selectedDate}));
  const existing = S.workouts.find(w=>w.date===selectedDate);
  if (existing) {
    existing.exercises.push(...exercises);
    toast(`✅ Adicionado ao treino de ${selectedDate}!`,'#30d158');
  } else {
    S.workouts.push({date:selectedDate, exercises});
    toast(`✅ Treino criado em ${selectedDate}!`,'#30d158');
  }
  save(); refresh(); renderWeekStrip();
}

function deleteTemplate(i) {
  if (!confirm('Remover template?')) return;
  S.templates.splice(i,1); save(); renderTemplatesInModal(); refresh();
  toast('Template removido','#ff9f0a');
}

// ================================================================
// EXPORT / IMPORT
// ================================================================
function exportToFile() {
  try {
    const dataStr = JSON.stringify(S, null, 2);
    const filename = `ren_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('📁 Backup exportado!', '#30d158');
  } catch(e) {
    const dataStr = JSON.stringify(S, null, 2);
    const filename = `ren_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('📁 Backup exportado!', '#30d158');
  }
}

function importFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported && (Array.isArray(imported.workouts) || Array.isArray(imported.restDays) || Array.isArray(imported.templates))) {
        if (confirm('Substituir todos os dados atuais? Esta ação não pode ser desfeita.')) {
          S = imported;
          if (!S.workouts) S.workouts = [];
          if (!S.restDays) S.restDays = [];
          if (!S.templates) S.templates = [];
          if (!S.todayExercises) S.todayExercises = [];
          save();
          refresh();
          toast('📥 Dados importados!', '#30d158');
        }
      } else {
        toast('❌ Arquivo inválido', '#ff453a');
      }
    } catch(e) {
      toast('❌ Erro ao ler arquivo', '#ff453a');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}
</script>
