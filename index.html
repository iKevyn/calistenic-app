<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ren — Calistenia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000000;
  --card:#1c1c1e;
  --card2:#2c2c2e;
  --t1:#ffffff;
  --t2:rgba(235,235,245,.8);
  --t3:rgba(235,235,245,.45);
  --sep:rgba(84,84,88,.45);
  --primary:#30d158;
  --primary-dim:rgba(48,209,88,.15);
  --blue:#0a84ff;
  --orange:#ff9f0a;
  --red:#ff453a;
  --purple:#bf5af2;
  --cyan:#64d2ff;
  --pink:#ff375f;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --r:16px;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f2f2f7;
    --card:#ffffff;
    --card2:#f2f2f7;
    --t1:#000000;
    --t2:rgba(60,60,67,.8);
    --t3:rgba(60,60,67,.45);
    --sep:rgba(60,60,67,.12);
  }
}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  color:var(--t1);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:420px;margin:0 auto;padding-bottom:calc(24px + var(--safe-bottom));position:relative;z-index:1}

/* Status Bar */
.status-spacer{height:calc(54px + var(--safe-top))}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--primary-dim)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

#app{animation:fadeIn 0.4s ease-out}

/* Header */
.page-header{
  padding:8px 20px 16px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.page-header h1{font-size:36px;font-weight:700;letter-spacing:-.6px;line-height:1.1}
.page-header .sub{font-size:13px;color:var(--t3);margin-top:4px;font-weight:500}

/* Streak Widget - Apple Activity Style */
.streak-widget{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(48,209,88,0.12),rgba(48,209,88,0.05));
  padding:8px 14px;border-radius:16px;
  cursor:pointer;transition:all .2s;
}
.streak-widget:active{transform:scale(0.95)}
.streak-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--primary),#30d158);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(48,209,88,0.3);
}
.streak-icon svg{width:20px;height:20px}
.streak-info{display:flex;flex-direction:column}
.streak-val{font-size:18px;font-weight:700;color:var(--primary);line-height:1}
.streak-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}

/* Header Buttons */
.header-btn{
  background:var(--card);border:none;border-radius:10px;
  padding:8px 10px;font-size:16px;cursor:pointer;
  transition:transform .15s;
}
.header-btn:active{transform:scale(0.9)}

/* Section Label */
.section-label{
  font-size:12px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.5px;
  padding:0 16px;margin-bottom:10px;margin-top:4px;
}

/* Widget Grid */
.widget-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:0 16px;margin-bottom:12px;
}
.widget{
  background:var(--card);border-radius:14px;
  padding:14px 8px;text-align:center;
  cursor:pointer;transition:all .2s;
  animation:fadeInUp 0.4s ease-out 0.4s both;
}
.widget:active{transform:scale(0.96);background:var(--card2)}
.w-icon{font-size:24px;margin-bottom:6px}
.w-label{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.w-value{font-size:18px;font-weight:700;margin-top:4px}
.w-sub{font-size:9px;color:var(--t3);margin-top:2px}

/* Mini Stats Row */
.mini-stats{
  display:flex;gap:8px;padding:0 16px;margin-bottom:16px;
  animation:fadeInUp 0.4s ease-out 0.3s both;
}
.ms-card{
  flex:1;background:var(--card);border-radius:var(--r);
  padding:12px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all .2s;
}
.ms-card:active{transform:scale(0.97)}
.ms-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.ms-info{flex:1}
.ms-value{font-size:18px;font-weight:700}
.ms-label{font-size:10px;color:var(--t3);margin-top:1px}

/* AI Widget - Principal (Apple Health Style) */
.ai-widget{
  background:linear-gradient(135deg,rgba(48,209,88,0.08) 0%,rgba(48,209,88,0.02) 100%);
  border-radius:20px;margin:0 16px 16px;
  padding:20px;cursor:pointer;
  animation:fadeInUp 0.4s ease-out 0.1s both;
  transition:all .2s;
  position:relative;overflow:hidden;
}
.ai-widget::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--primary),#30d158,var(--cyan));
  border-radius:20px 20px 0 0;
}
.ai-widget:active{transform:scale(0.98)}
.ai-content{display:flex;align-items:flex-start;gap:16px}
.ai-icon-wrap{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,rgba(48,209,88,0.2),rgba(48,209,88,0.1));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ai-icon{width:28px;height:28px}
.ai-info{flex:1;min-width:0}
.ai-title{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-title-text{letter-spacing:-0.2px}
.ai-live{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:pulse 2s infinite}
.ai-preview{font-size:15px;font-weight:500;color:var(--t1);line-height:1.4}
.ai-sub{font-size:12px;color:var(--t3);margin-top:4px}
.ai-suggestions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.ai-sug{background:rgba(48,209,88,0.1);padding:5px 10px;border-radius:8px;font-size:11px;color:var(--primary);font-weight:500}

/* Week Strip */
.week-strip{
  display:flex;justify-content:space-between;padding:0 16px;margin-bottom:16px;
  animation:fadeInUp 0.4s ease-out 0.2s both;
}
.wd{flex:1;text-align:center}
.wd-label{font-size:10px;font-weight:500;color:var(--t3);margin-bottom:6px}
.wd-bubble{
  width:36px;height:36px;border-radius:50%;margin:0 auto;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;
  background:var(--card);color:var(--t3);
  position:relative;overflow:hidden;
  transition:transform .15s;
}
.wd-bubble:hover{transform:scale(1.1)}
.wd-bubble.today{border:2px solid var(--primary)}
.wd-bubble.today .wd-num{color:var(--primary)}
.wd-bubble.has-workout{background:var(--primary);color:#fff}
.wd-bubble.rest{background:var(--primary-dim);color:var(--primary)}
.wd-bars{position:absolute;bottom:0;left:0;right:0;height:3px;display:flex}
.wd-bars span{flex:1}

/* FAB */
.fab{
  position:fixed;bottom:calc(70px + var(--safe-bottom));
  right:calc(50% - 190px);
  background:var(--primary);color:#000;
  border:none;border-radius:28px;
  padding:16px 24px;font-size:15px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(48,209,88,.4);
  cursor:pointer;z-index:90;
  animation:fadeInUp 0.4s ease-out 0.5s both;
  transition:transform .1s, box-shadow .2s;
}
.fab:hover{box-shadow:0 6px 24px rgba(48,209,88,.5)}
.fab:active{transform:scale(0.95)}
.fab svg{width:18px;height:18px}

/* Modal System */
.modal-mask{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s;
}
.modal-sheet{
  background:var(--card);
  border-radius:24px 24px 0 0;
  width:100%;max-width:420px;max-height:92vh;
  overflow-y:auto;
  padding:0 0 calc(20px + var(--safe-bottom));
  box-shadow:0 -10px 40px rgba(0,0,0,.4);
  animation:slideUp .35s cubic-bezier(.32,1,.32,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--sep);border-radius:2px;margin:12px auto 0}
.modal-header-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;position:sticky;top:0;
  background:var(--card);z-index:2;border-bottom:1px solid var(--sep);
}
.modal-title{font-size:18px;font-weight:700}
.modal-close{
  width:28px;height:28px;border-radius:50%;
  background:var(--card2);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--t2);
}
.modal-body{padding:16px 20px}

/* Form Elements */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field input,.field select{
  width:100%;background:var(--card2);border:1px solid var(--sep);
  border-radius:12px;padding:12px 14px;
  font-size:15px;color:var(--t1);outline:none;
  -webkit-appearance:none;appearance:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--primary)}
.field select option{background:var(--card)}

.seg{display:flex;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:14px}
.seg-btn{
  flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;
  color:var(--t3);border-radius:8px;cursor:pointer;border:none;background:none;
  transition:all .18s;
}
.seg-btn.active{background:var(--card);color:var(--t1);font-weight:600}

.btn-primary{
  width:100%;padding:16px;background:var(--primary);color:#000;
  border:none;border-radius:14px;font-size:16px;font-weight:600;
  cursor:pointer;transition:opacity .15s;
}
.btn-primary:active{opacity:.8}

/* Exercise List */
.ex-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ex-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.ex-name{font-size:15px;font-weight:600}
.ex-detail{font-size:12px;color:var(--t3);margin-top:2px}
.ex-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-push{background:rgba(10,132,255,.15);color:var(--blue)}
.badge-pull{background:rgba(48,209,88,.15);color:var(--primary)}
.badge-legs{background:rgba(255,159,10,.15);color:var(--orange)}
.badge-core{background:rgba(191,90,242,.15);color:var(--purple)}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:16px;font-weight:600}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--card2);border:none;cursor:pointer;
  color:var(--t2);font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{
  aspect-ratio:1;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:12px;font-weight:500;color:var(--t3);
  position:relative;cursor:pointer;
}
.cal-cell:hover{background:var(--card2)}
.cal-cell.today{background:var(--primary-dim);color:var(--primary);font-weight:700}
.cal-cell.workout{background:var(--card);color:var(--t1);font-weight:600}
.cal-bars{position:absolute;bottom:2px;left:2px;right:2px;height:3px;display:flex;gap:1px}
.cal-bars span{flex:1;border-radius:1px}

/* PR List */
.pr-list{display:flex;flex-direction:column;gap:8px}
.pr-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.pr-name{font-size:15px;font-weight:600}
.pr-val{font-size:18px;font-weight:700;color:var(--orange)}

/* History */
.hist-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;margin-bottom:8px;
}
.hist-date{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px}
.hist-exercises{font-size:13px;color:var(--t2)}

/* Muscle Selector */
.muscle-selector{display:flex;gap:8px;margin-top:8px}
.muscle-option{
  flex:1;text-align:center;padding:10px 0;border-radius:10px;
  font-size:12px;font-weight:600;background:var(--card2);
  color:var(--t3);cursor:pointer;transition:all .15s;
}
.muscle-option.active{background:var(--primary);color:#000}

/* Toast */
.toast{
  position:fixed;top:calc(60px + var(--safe-top));left:50%;
  transform:translateX(-50%) translateY(-10px);
  padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;
  z-index:9999;opacity:0;transition:all .25s;pointer-events:none;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Templates */
.tpl-list{display:flex;flex-direction:column;gap:8px}
.tpl-item{
  background:var(--card2);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.tpl-name{font-size:15px;font-weight:600}
.tpl-meta{font-size:12px;color:var(--t3)}

/* Chart */
.chart-container{height:180px;position:relative}

/* Loading Skeleton */
@keyframes skeleton-pulse{0%,100%{opacity:0.4}50%{opacity:0.7}}
.skeleton{background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);background-size:200% 100%;animation:skeleton-pulse 1.5s ease-in-out infinite;border-radius:8px}
.skeleton-text{height:14px;width:60%}
.skeleton-title{height:20px;width:80%}
.skeleton-box{height:60px;border-radius:12px}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* Icons (simulated with emoji/svg) */
.ico-push{color:var(--blue)}
.ico-pull{color:var(--primary)}
.ico-legs{color:var(--orange)}
.ico-core{color:var(--purple)}
</style>
</head>
<body>
<div id="app">
  <div class="status-spacer"></div>
  
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>Ren</h1>
      <div class="sub" id="hdr-date"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="header-btn" onclick="exportToFile()" title="Exportar">📤</button>
      <button class="header-btn" onclick="document.getElementById('importFile').click()" title="Importar">📥</button>
      <div class="streak-widget" onclick="openProgressModal()">
        <div class="streak-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C9.5 6 8 8.5 8 11c0 2.2 1.8 4 4 4s4-1.8 4-4c0-2.5-1.5-5-4-9z"/>
            <path d="M8 14l2-2 2 2 2-2 2 2"/>
          </svg>
        </div>
        <div class="streak-info">
          <span class="streak-val" id="streak-text">0</span>
          <span class="streak-label">Streak</span>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFromFile(event)">

  <!-- AI Widget - Principal -->
  <div class="ai-widget" onclick="openAIModal()">
    <div class="ai-content">
      <div class="ai-icon-wrap">
        <svg class="ai-icon" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10"/>
          <path d="M12 6v6l4 2"/>
          <circle cx="12" cy="12" r="3" fill="var(--primary)" stroke="none"/>
        </svg>
      </div>
      <div class="ai-info">
        <div class="ai-title">
          <span class="ai-title-text">Coach IA</span>
          <span class="ai-live"></span>
        </div>
        <div class="ai-preview" id="ai-preview">Calculando...</div>
        <div class="ai-sub" id="ai-sub">Toque para ver análises</div>
      </div>
    </div>
    <div class="ai-suggestions" id="ai-suggestions"></div>
  </div>

  <!-- Week Strip -->
  <div class="week-strip" id="week-strip"></div>

  <!-- Mini Stats -->
  <div class="mini-stats">
    <div class="ms-card" onclick="openHistoryModal()">
      <div class="ms-icon" style="background:rgba(10,132,255,.15)">🏋️</div>
      <div class="ms-info">
        <div class="ms-value" id="ms-total">0</div>
        <div class="ms-label">Treinos</div>
      </div>
    </div>
    <div class="ms-card">
      <div class="ms-icon" style="background:rgba(48,209,88,.15)">📈</div>
      <div class="ms-info">
        <div class="ms-value" id="ms-week">0</div>
        <div class="ms-label">Semana</div>
      </div>
    </div>
    <div class="ms-card" onclick="openProgressModal()">
      <div class="ms-icon" style="background:rgba(255,159,10,.15)">🎯</div>
      <div class="ms-info">
        <div class="ms-value" id="ms-streak">0</div>
        <div class="ms-label">Streak</div>
      </div>
    </div>
  </div>

  <!-- Widgets Grid -->
  <div class="section-label">Ferramentas</div>
  <div class="widget-grid">
    <div class="widget" onclick="openCalendarModal()">
      <div class="w-icon">📅</div>
      <div class="w-label">Calendário</div>
      <div class="w-value" style="color:var(--blue)" id="w-cal">—</div>
    </div>
    <div class="widget" onclick="openPRModal()">
      <div class="w-icon">🏆</div>
      <div class="w-label">Records</div>
      <div class="w-value" style="color:var(--orange)" id="w-pr">0</div>
    </div>
    <div class="widget" onclick="openVolumeModal()">
      <div class="w-icon">📊</div>
      <div class="w-label">Volume</div>
      <div class="w-value" style="color:var(--purple)" id="w-vol">—</div>
    </div>
    <div class="widget" onclick="openTemplatesModal()">
      <div class="w-icon">📋</div>
      <div class="w-label">Templates</div>
      <div class="w-value" id="w-tpl">0</div>
    </div>
  </div>

  <div style="height:120px"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Registrar Treino
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ================================================================
// DATA & STATE
// ================================================================
const MUSCLE_MAP={
  'Flexão (Push-up)':'push','Flexão diamante':'push','Pike push-up':'push','Handstand push-up':'push','Paralela (Dip)':'push','Ring push-up':'push','Archer push-up':'push',
  'Barra fixa (Pull-up)':'pull','Barra supinada (Chin-up)':'pull','Muscle-up':'pull','Australian pull-up':'pull','L-sit pull-up':'pull','Archer pull-up':'pull','Typewriter pull-up':'pull',
  'Agachamento (Squat)':'legs','Pistol squat':'legs','Afundo (Lunge)':'legs','Nordic curl':'legs','Elevação de quadril':'legs','Bulgarian split squat':'legs',
  'Prancha (Plank)':'core','L-sit':'core','Hanging leg raise':'core','Dragon flag':'core','Ab wheel rollout':'core','Hollow body hold':'core','Toes to bar':'core'
};
const GROUP_NAMES={pull:'Pull 🦾',push:'Push 💪',legs:'Legs 🦵',core:'Core 🧘',rest:'Descanso 😴'};
const GROUP_COLORS={pull:'#30d158',push:'#0a84ff',legs:'#ff9f0a',core:'#bf5af2'};
const MUSCLE_LABEL={push:'Push',pull:'Pull',legs:'Legs',core:'Core'};

let S={workouts:[],restDays:[],templates:[],todayExercises:[]};
let sessionType='workout', countType='reps';

function load(){try{const s=localStorage.getItem('ren_v1');if(s)S=JSON.parse(s);}catch(e){}}

load();

function today(){return new Date().toISOString().split('T')[0]}
document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});

// ================================================================
// TOAST
// ================================================================
function toast(msg,color='#30d158'){const el=document.getElementById('toast');el.textContent=msg;el.style.background=color;el.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}

// ================================================================
// MODAL SYSTEM
// ================================================================
function createModal(id, title, bodyHtml, opts={}) {
  let el = document.getElementById(id);
  if (el) el.remove();
  el = document.createElement('div');
  el.id = id;
  el.className = 'modal-mask';
  el.addEventListener('click', e => { if(e.target === el) el.remove(); });
  
  const sheetClass = opts.center ? 'modal-sheet center' : 'modal-sheet';
  el.innerHTML = `
    <div class="${sheetClass}">
      ${opts.center ? '' : '<div class="modal-handle"></div>'}
      <div class="modal-header-bar">
        <span class="modal-title">${title}</span>
        <button class="modal-close" onclick="document.getElementById('${id}').remove()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="${id}-body">${bodyHtml}</div>
    </div>
  `;
  document.body.appendChild(el);
  return el;
}

function openTodayModal() {
  const t = today();
  const savedToday = S.workouts.find(w=>w.date===t);
  const allToday = [...S.todayExercises, ...(savedToday ? savedToday.exercises : [])];
  
  if (!allToday.length) {
    createModal('todayModal', 'Treino de Hoje', `
      <div class="empty-state">
        <div class="empty-icon">🏋️</div>
        <div class="empty-title">Nenhum exercício hoje</div>
        <div class="empty-sub">Toque em Registrar para começar</div>
        <button class="btn-primary" style="margin-top:16px" onclick="document.getElementById('todayModal').remove();openAddModal()">+ Registrar</button>
      </div>
    `);
    return;
  }
  
  let html = '<div class="ex-list">';
  const grouped = {};
  allToday.forEach(e => {
    if (!grouped[e.ex]) grouped[e.ex] = {sets:0, reps:0, muscle:e.muscle, notes:e.notes};
    grouped[e.ex].sets += e.sets;
    grouped[e.ex].reps += e.reps;
  });
  
  Object.entries(grouped).forEach(([ex,data])=>{
    html += `<div class="ex-item">
      <div>
        <div class="ex-name">${ex}</div>
        <div class="ex-detail">${data.sets} séries × ${data.reps} reps${data.notes ? ' · '+data.notes : ''}</div>
      </div>
      <span class="ex-badge badge-${data.muscle}">${MUSCLE_LABEL[data.muscle]}</span>
    </div>`;
  });
  html += '</div>';
  
  const total = allToday.reduce((a,e)=>a+(e.isTime?0:e.sets*e.reps),0);
  html += `<div style="text-align:center;padding:16px;background:var(--card2);border-radius:12px;margin-top:12px">
    <div style="font-size:28px;font-weight:700;color:var(--primary)">${total}</div>
    <div style="font-size:12px;color:var(--t3)">reps totais hoje</div>
  </div>`;
  
  createModal('todayModal', 'Treino de Hoje', html);
}

function selectMuscle(containerId, muscle) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.muscle-option').forEach(el=>el.classList.remove('active'));
  container.querySelector(`[data-muscle="${muscle}"]`).classList.add('active');
}

function setSession(type, btn) {
  sessionType = type;
  document.querySelectorAll('#session-seg .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('workout-fields').style.display = type==='workout' ? 'block' : 'none';
  document.getElementById('rest-fields').style.display = type==='rest' ? 'block' : 'none';
}

function setCountType(type, btn) {
  countType = type;
  document.querySelectorAll('#count-seg .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('reps-unit').textContent = type === 'time' ? 'seg' : 'reps';
  document.getElementById('reps-input').value = type === 'time' ? '30' : '10';
}

function addExercise() {
  const sel = document.getElementById('ex-select').value;
  const ex = sel || 'Exercício';
  const sets = parseInt(document.getElementById('sets-input').value)||1;
  const reps = parseInt(document.getElementById('reps-input').value)||1;
  const muscleSelector = document.getElementById('add-muscle-selector');
  const muscle = [...muscleSelector.querySelectorAll('.active')][0]?.dataset.muscle || MUSCLE_MAP[ex] || 'core';
  if (!sel) { toast('Selecione um exercício','#ff453a'); return; }
  const entry = {ex,sets,reps,isTime:countType==='time',notes:'',muscle,ts:Date.now(),date:today()};
  S.todayExercises.push(entry);
  if (!entry.isTime) checkPR(ex, reps);
  save(); refresh(); document.getElementById('addModal').remove();
  toast('Exercício adicionado! ✓','#30d158');
}

function checkPR(ex, reps) {
  const all = S.workouts.flatMap(w=>w.exercises).filter(e=>e.ex===ex);
  const max = all.length ? Math.max(...all.map(e=>e.reps)) : 0;
  if (reps > max && all.length > 0) toast('🏆 Novo PR! '+reps+' reps','#ff9f0a');
}

function saveRestDay() {
  const date = document.getElementById('workout-date').value || today();
  S.restDays = S.restDays.filter(r=>r.date!==date);
  S.restDays.push({date, notes:''});
  save(); refresh(); document.getElementById('addModal').remove();
  toast('Descanso salvo! 😴','#30d158');
}

function getStreak(){
  const all=new Set([...S.workouts.map(w=>w.date),...S.restDays.map(r=>r.date)]);
  let streak=0; const d=new Date();
  for(let i=0;i<365;i++){
    const s=d.toISOString().split('T')[0];
    if(all.has(s)) streak++; else if(i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function calculateDetailedStats() {
  const stats = {
    totalWorkouts: S.workouts.length,
    workoutsThisWeek: 0,
    workoutsLastWeek: 0,
    avgVolumePerWorkout: 0,
    currentStreak: getStreak(),
    longestStreak: 0,
    mostTrainedMuscle: null,
    leastTrainedMuscle: null,
    muscleDistribution: {push: 0, pull: 0, legs: 0, core: 0},
    bestExercise: null,
    bestExerciseGain: 0,
    worstExercise: null,
    predictedPRs: [],
    totalVolumeAllTime: 0,
    totalRepsAllTime: 0,
    restDaysCount: S.restDays.length,
    daysSinceLastWorkout: 0,
    peakDayOfWeek: null,
    weeklyProgress: 0,
    hasPlateau: false,
    plateauWeeks: 0,
    trainingConsistency: 0,
    intensityScore: 0,
    recoveryScore: 0,
    nextRecommendedGroup: null,
    recommendedExercise: null,
    weakMuscles: [],
    strongMuscles: [],
    recentTrend: 'stable',
    personalRecords: {},
    skillLevel: 'beginner',
    monthlyVolume: 0,
    monthlyWorkouts: 0,
    volumeTarget: 500,
    workoutsTarget: 12,
    progressTowardsGoals: 0
  };
  
  if (!stats.totalWorkouts) return stats;
  
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
  const lw = new Date(ws); lw.setDate(lw.getDate() - 7);
  const ms = now.toISOString().slice(0, 7);
  
  stats.workoutsThisWeek = S.workouts.filter(w => new Date(w.date + 'T12:00:00') >= ws).length;
  stats.workoutsLastWeek = S.workouts.filter(w => {
    const d = new Date(w.date + 'T12:00:00');
    return d >= lw && d < ws;
  }).length;
  
  const totalVolume = S.workouts.reduce((s, w) => s + w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.sets * e.reps), 0), 0);
  const totalReps = S.workouts.reduce((s, w) => s + w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.reps), 0), 0);
  stats.totalVolumeAllTime = totalVolume;
  stats.totalRepsAllTime = totalReps;
  stats.avgVolumePerWorkout = totalVolume / stats.totalWorkouts;
  
  const mc = {push: 0, pull: 0, legs: 0, core: 0};
  const mcVol = {push: 0, pull: 0, legs: 0, core: 0};
  S.workouts.forEach(w => w.exercises.forEach(e => {
    if (e.muscle) {
      mc[e.muscle]++;
      mcVol[e.muscle] += e.isTime ? 0 : e.sets * e.reps;
    }
  }));
  stats.muscleDistribution = mcVol;
  const total = Object.values(mcVol).reduce((a, b) => a + b, 0);
  const sorted = Object.entries(mcVol).sort((a, b) => b[1] - a[1]);
  if (sorted.length && sorted[0][1] > 0) {
    stats.mostTrainedMuscle = sorted[0][0];
    stats.leastTrainedMuscle = sorted[sorted.length - 1][0];
  }
  
  const progress = {};
  S.workouts.forEach(w => w.exercises.forEach(e => {
    if (!e.isTime && e.reps > 0) {
      if (!progress[e.ex]) progress[e.ex] = [];
      progress[e.ex].push({reps: e.reps, date: w.date, muscle: e.muscle});
    }
  }));
  
  let bestEx = null, bestGain = 0;
  let worstEx = null, worstDecline = 0;
  Object.entries(progress).forEach(([ex, entries]) => {
    if (entries.length >= 2) {
      const first = entries[0].reps;
      const last = entries[entries.length - 1].reps;
      const gain = last - first;
      if (gain > bestGain) { bestGain = gain; bestEx = ex; }
      if (gain < worstDecline) { worstDecline = gain; worstEx = ex; }
    }
    stats.personalRecords[ex] = Math.max(...entries.map(e => e.reps));
  });
  stats.bestExercise = bestEx;
  stats.bestExerciseGain = bestGain;
  stats.worstExercise = worstEx;
  
  const lastWorkouts = S.workouts.slice(-5);
  lastWorkouts.forEach(w => {
    const dayVol = w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.sets * e.reps), 0);
    const trend = {};
    w.exercises.forEach(e => {
      if (!trend[e.ex]) trend[e.ex] = [];
      trend[e.ex].push(e.reps);
    });
    Object.entries(trend).forEach(([ex, reps]) => {
      if (reps.length >= 2) {
        const predicted = Math.max(...reps) + Math.ceil((reps[reps.length - 1] - reps[0]) / reps.length);
        if (predicted > Math.max(...reps)) {
          stats.predictedPRs.push({exercise: ex, predicted});
        }
      }
    });
  });
  
  const dayTotals = [0, 0, 0, 0, 0, 0, 0];
  const dayCounts = [0, 0, 0, 0, 0, 0, 0];
  S.workouts.forEach(w => {
    const d = new Date(w.date).getDay();
    dayCounts[d]++;
    dayTotals[d] += w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.sets * e.reps), 0);
  });
  const avgPerDay = dayTotals.map((t, i) => dayCounts[i] > 0 ? t / dayCounts[i] : 0);
  const maxDayAvg = Math.max(...avgPerDay);
  stats.peakDayOfWeek = avgPerDay.indexOf(maxDayAvg);
  
  const lastWorkout = S.workouts[S.workouts.length - 1];
  if (lastWorkout) {
    const diff = now - new Date(lastWorkout.date);
    stats.daysSinceLastWorkout = Math.floor(diff / (1000 * 60 * 60 * 24));
  }
  
  const lastWeekVol = S.workouts.filter(w => new Date(w.date + 'T12:00:00') >= ws)
    .reduce((s, w) => s + w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.sets * e.reps), 0), 0);
  const prevWeekVol = S.workouts.filter(w => {
    const d = new Date(w.date + 'T12:00:00');
    return d >= lw && d < ws;
  }).reduce((s, w) => s + w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.sets * e.reps), 0), 0);
  if (prevWeekVol > 0) {
    stats.weeklyProgress = Math.round(((lastWeekVol - prevWeekVol) / prevWeekVol) * 100);
    if (stats.weeklyProgress > 10) stats.recentTrend = 'up';
    else if (stats.weeklyProgress < -10) stats.recentTrend = 'down';
  }
  
  const last8Weeks = S.workouts.filter(w => {
    const d = new Date(w.date);
    const eightWeeksAgo = new Date(now);
    eightWeeksAgo.setDate(now.getDate() - 56);
    return d >= eightWeeksAgo;
  });
  const weeks = {};
  last8Weeks.forEach(w => {
    const d = new Date(w.date);
    const weekNum = Math.floor((now - d) / (7 * 24 * 60 * 60 * 1000));
    weeks[weekNum] = (weeks[weekNum] || 0) + w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.sets * e.reps), 0);
  });
  const weekVals = Object.values(weeks).filter(v => v > 0);
  if (weekVals.length >= 4) {
    const recent = weekVals.slice(-3);
    const avg = recent.reduce((a, b) => a + b, 0) / recent.length;
    const variance = recent.every(v => Math.abs(v - avg) < avg * 0.15);
    if (variance) {
      stats.hasPlateau = true;
      stats.plateauWeeks = recent.length;
    }
  }
  
  const muscleBalance = Object.entries(mcVol).filter(([, v]) => v > 0);
  if (muscleBalance.length >= 3) {
    const vals = muscleBalance.map(([, v]) => v);
    const max = Math.max(...vals);
    const min = Math.min(...vals);
    const ratio = min / max;
    if (ratio < 0.4) {
      stats.weakMuscles = muscleBalance.filter(([, v]) => v < max * 0.5).map(([m]) => m);
      stats.strongMuscles = muscleBalance.filter(([, v]) => v >= max * 0.8).map(([m]) => m);
    }
  }
  
  const firstDate = S.workouts.length > 0 ? new Date(S.workouts[0].date) : null;
  if (firstDate) {
    const daysSinceStart = Math.floor((now - firstDate) / (1000 * 60 * 60 * 24));
    const weeksActive = Math.max(1, Math.floor(daysSinceStart / 7));
    stats.trainingConsistency = Math.min(1, S.workouts.length / (weeksActive * 3.5));
  }
  
  const bestSet = Math.max(...Object.values(stats.personalRecords), 0);
  if (stats.totalWorkouts > 50 && stats.trainingConsistency > 0.7) stats.skillLevel = 'advanced';
  else if (stats.totalWorkouts > 20 && stats.trainingConsistency > 0.5) stats.skillLevel = 'intermediate';
  else if (stats.totalWorkouts > 5) stats.skillLevel = 'beginner';
  
  stats.monthlyVolume = S.workouts.filter(w => w.date.startsWith(ms))
    .reduce((s, w) => s + w.exercises.reduce((a, e) => a + (e.isTime ? 0 : e.sets * e.reps), 0), 0);
  stats.monthlyWorkouts = S.workouts.filter(w => w.date.startsWith(ms)).length;
  
  const volProgress = Math.min(100, Math.round((stats.monthlyVolume / stats.volumeTarget) * 100));
  const workProgress = Math.min(100, Math.round((stats.monthlyWorkouts / stats.workoutsTarget) * 100));
  stats.progressTowardsGoals = Math.round((volProgress + workProgress) / 2);
  
  stats.intensityScore = Math.min(100, Math.round(stats.avgVolumePerWorkout / 2));
  stats.recoveryScore = stats.restDaysCount > 0 ? Math.min(100, Math.round((stats.restDaysCount / stats.totalWorkouts) * 150)) : 50;
  
  const cycle = ['pull', 'push', 'legs', 'core'];
  const recentGroups = S.workouts.slice(-3).map(w => {
    const cnt = {};
    w.exercises.forEach(e => { cnt[e.muscle] = (cnt[e.muscle] || 0) + 1; });
    return Object.entries(cnt).sort((a, b) => b[1] - a[1])[0]?.[0];
  }).filter(Boolean);
  const lastGroup = recentGroups[recentGroups.length - 1] || 'pull';
  const idx = cycle.indexOf(lastGroup);
  stats.nextRecommendedGroup = cycle[(idx + 1) % cycle.length];
  
  const exerciseRecommendations = {
    pull: ['Barra fixa (Pull-up)', 'Australian pull-up', 'Barra supinada (Chin-up)'],
    push: ['Flexão (Push-up)', 'Flexão diamante', 'Paralela (Dip)'],
    legs: ['Agachamento (Squat)', 'Afundo (Lunge)', 'Bulgarian split squat'],
    core: ['Prancha (Plank)', 'Hanging leg raise', 'L-sit']
  };
  stats.recommendedExercise = exerciseRecommendations[stats.nextRecommendedGroup]?.[0] || 'Flexão (Push-up)';
  
  return stats;
}

function generateAIAnalysis() {
  const stats = calculateDetailedStats();
  
  if (!stats.totalWorkouts) {
    return {
      message: "👋 Bem-vindo ao Ren! Seu coach de calistenia pessoal. Vamos começar sua jornada!",
      insights: [],
      recommendations: [
        {text: "Registre seu primeiro treino para desbloquear análises personalizadas", priority: 'high'},
        {text: "Comece com 3 treinos por semana: Pull, Push e Legs", priority: 'medium'},
        {text: "Cada sessão deve ter 3-5 exercícios com 3-4 séries cada", priority: 'medium'},
        {text: "Priorize a forma correta sobre a quantidade de reps", priority: 'high'}
      ],
      coachMessage: "Dica: Calistenia é sobre dominar o peso do próprio corpo. Paciência + consistência = resultados."
    };
  }
  
  const insights = [];
  const recommendations = [];
  let coachMessage = "";
  
  if (stats.workoutsThisWeek >= 4) {
    insights.push({type: 'elite', text: "🏆 Modo ELITE ativado! Você está treinando como atleta profissional."});
    coachMessage = "Incrível! Essa frequência é de alto rendimento. Não esqueça de dormir 7-8h e manter proteína alta.";
  } else if (stats.workoutsThisWeek >= 3) {
    insights.push({type: 'good', text: "💪 Consistency gold! Você está no caminho certo para resultados reais."});
    coachMessage = "3x por semana é o ponto ideal. Seu corpo tem tempo de recuperar e grow.";
  } else if (stats.workoutsThisWeek > 0) {
    insights.push({type: 'progress', text: `📊 ${stats.workoutsThisWeek}x essa semana. Vamos llegar a 3?`});
    coachMessage = "Você está construindo o hábito. Mais 1-2 treinos e você atinge a frequência ideal.";
  } else if (stats.daysSinceLastWorkout > 3) {
    insights.push({type: 'warning', text: `⏰ ${stats.daysSinceLastWorkout} dias sem treinar. Vamos voltar hoje?`});
    coachMessage = "O corpo não espera. A adaptação muscular começa a regredir após 7 dias. É hora de voltar!";
  } else {
    insights.push({type: 'info', text: "📅 Semana nova, oportunidades novas. Bora treinar!"});
    coachMessage = "Cada semana é uma chance de evoluir. Foque em melhorar pelo menos 1 rep em cada exercício.";
  }
  
  if (stats.currentStreak >= 14) {
    insights.push({type: 'elite', text: `🔥🔥🔥 ${stats.currentStreak} DIAS DE STREAK! Você é lenda!`});
    recommendations.push({text: "Mantenha esse ritmo! Você está construindo identidade de atleta", priority: 'maintain'});
  } else if (stats.currentStreak >= 7) {
    insights.push({type: 'good', text: `🔥 ${stats.currentStreak} dias de streak! O hábito está se formando.`});
    recommendations.push({text: `Faltam ${14 - stats.currentStreak} dias para se tornar lendário`, priority: 'high'});
  } else if (stats.currentStreak > 0) {
    insights.push({type: 'progress', text: `🔥 ${stats.currentStreak} dias - continue!`});
    recommendations.push({text: `${7 - stats.currentStreak} dias até o primeiro marco de uma semana`, priority: 'medium'});
  }
  
  if (stats.bestExercise && stats.bestExerciseGain > 5) {
    insights.push({type: 'progress', text: `📈 ${stats.bestExercise}: +${stats.bestExerciseGain} reps! Evolution is real.`});
    recommendations.push({text: `Continue focando em ${stats.bestExercise} - você está perto do próximo nível`, priority: 'high'});
  }
  
  if (stats.bestExercise && stats.bestExerciseGain > 0) {
    recommendations.push({text: `Progressive overload: tente +2 reps ou +1 série em ${stats.bestExercise}`, priority: 'medium'});
  }
  
  if (stats.weakMuscles.length > 0) {
    const muscleNames = {push: 'Push (peito/tríceps)', pull: 'Pull (costas/bíceps)', legs: 'Legs (pernas)', core: 'Core (abdômen)'};
    insights.push({type: 'warning', text: `⚠️ Desequilíbrio: ${stats.weakMuscles.map(m => muscleNames[m]).join(', ')} estão negligenciados.`});
    recommendations.push({text: `Adicione 1-2 exercícios de ${muscleNames[stats.weakMuscles[0]]} por semana`, priority: 'high'});
    coachMessage = "Desequilíbrios musculares podem causar lesões e limitar seus gains. Balance é key!";
  }
  
  if (stats.mostTrainedMuscle) {
    const muscleNames = {push: 'Peito/Tríceps', pull: 'Costas/Bíceps', legs: 'Pernas', core: 'Core'};
    recommendations.push({text: `${muscleNames[stats.mostTrainedMuscle]} é seu ponto forte - explore variações mais difíceis`, priority: 'medium'});
  }
  
  if (stats.hasPlateau) {
    insights.push({type: 'warning', text: `🛑 Platô detectado há ${stats.plateauWeeks} semanas. Seu corpo se adaptou!`});
    recommendations.push({text: "Tente: mais reps, mais séries, menos pausa, ou variação mais difícil", priority: 'high'});
    coachMessage = "Platô é sinal de que você precisa de estímulo novo. Mude a variável: intensidade, volume ou exercício.";
  }
  
  if (stats.recentTrend === 'up') {
    insights.push({type: 'progress', text: `📈 Ascensão! Progresso semanal de +${stats.weeklyProgress}%. Continue assim!`});
  } else if (stats.recentTrend === 'down') {
    insights.push({type: 'warning', text: `📉 Queda de ${Math.abs(stats.weeklyProgress)}% essa semana. Revise sua intensidade.`});
    recommendations.push({text: "Faça uma semana de deload: reduza volume em 40%", priority: 'high'});
  }
  
  if (stats.trainingConsistency > 0.8) {
    insights.push({type: 'elite', text: "🎯 Consistência de 80%+ - você é um atleta consistente!"});
  } else if (stats.trainingConsistency < 0.4 && stats.totalWorkouts > 5) {
    insights.push({type: 'warning', text: "📉 Consistência baixa - foco na rotina primeiro."});
    recommendations.push({text: "Treine nos mesmos horários para criar hábito neural", priority: 'medium'});
  }
  
  if (stats.nextRecommendedGroup) {
    const muscleNames = {push: 'Push 💪', pull: 'Pull 🦾', legs: 'Legs 🦵', core: 'Core 🧘'};
    recommendations.push({text: `Hoje é dia de ${muscleNames[stats.nextRecommendedGroup]}`, priority: 'action'});
    recommendations.push({text: `Sugestão: ${stats.recommendedExercise}`, priority: 'action'});
  }
  
  if (stats.restDaysCount / stats.totalWorkouts < 0.1 && stats.totalWorkouts > 5) {
    insights.push({type: 'warning', text: "😴 Pouco descanso detectado! Recuperação é quando o músculo cresce."});
    recommendations.push({text: "Agende 1-2 dias de descanso por semana", priority: 'high'});
  }
  
  if (stats.peakDayOfWeek !== null) {
    const dayNames = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    recommendations.push({text: `📅 Seu melhor dia é ${dayNames[stats.peakDayOfWeek]} - aproveite esse padrão!`, priority: 'info'});
  }
  
  if (stats.skillLevel === 'beginner') {
    recommendations.push({text: "🎯 Nível Iniciante: foque em fundamentos - form first!", priority: 'maintain'});
    coachMessage += " Como iniciante, sua prioridade é aprender a movimento correto. Ganhos rápidos virão!";
  } else if (stats.skillLevel === 'intermediate') {
    recommendations.push({text: "🎯 Nível Intermediário: hora de progredir para variações mais difíceis", priority: 'maintain'});
    coachMessage += " Fase de intermediação é onde a maioria desiste. Você está à frente!";
  } else if (stats.skillLevel === 'advanced') {
    recommendations.push({text: "🎯 Nível Avançado: explore skills (muscle-up, front lever, handstand)", priority: 'maintain'});
    coachMessage += " Como atleta avançado, vary seu treino com técnicas como drop sets e pause reps.";
  }
  
  const prCount = Object.keys(stats.personalRecords).length;
  if (prCount > 0) {
    recommendations.push({text: `🏆 ${prCount} records pessoais estabelecidos! Mostre essa garra.`, priority: 'milestone'});
  }
  
  if (stats.progressTowardsGoals > 0) {
    recommendations.push({text: `📊 Meta mensal: ${stats.progressTowardsGoals}% concluído (${stats.monthlyVolume}/${stats.volumeTarget} reps)`, priority: 'info'});
  }
  
  if (stats.totalVolumeAllTime > 50000) {
    insights.push({type: 'elite', text: `🎉 ${Math.floor(stats.totalVolumeAllTime / 1000)}k+ reps no total - você é LENDÁRIO!`});
  }
  
  if (recommendations.length < 3) {
    recommendations.push({text: "💡 Varie exercícios para manter adaptação constante", priority: 'medium'});
    recommendations.push({text: "🧘 Alongamento e mobilidade são tão importantes quanto o treino", priority: 'medium'});
  }
  
  return {
    message: coachMessage || "Continue assim! Cada treino te deixa mais forte.",
    insights,
    recommendations,
    coachMessage: coachMessage
  };
}

function detectTodayGroup() {
  const t=today(); const sources=[...S.todayExercises];
  const saved=S.workouts.find(w=>w.date===t); if(saved) sources.push(...saved.exercises);
  if(!sources.length) return null;
  const cnt={};
  sources.forEach(e=>{cnt[e.muscle]=(cnt[e.muscle]||0)+(e.isTime?0:e.sets*e.reps);});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0];
}

function guessNextGroup() {
  const recent=S.workouts.slice(-3).map(w=>{
    const cnt={};w.exercises.forEach(e=>{cnt[e.muscle]=(cnt[e.muscle]||0)+1;});
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0];
  }).filter(Boolean);
  const lastGroup=recent[recent.length-1];
  const cycle=['pull','push','legs','core'];
  if(!lastGroup) return 'pull';
  const idx=cycle.indexOf(lastGroup);
  return cycle[(idx+1)%cycle.length];
}

function getPRForGroup(group) {
  let max=0;
  S.workouts.flatMap(w=>w.exercises).forEach(e=>{if(e.muscle===group&&!e.isTime&&e.reps>max)max=e.reps;});
  return max?max+'r':'—';
}

function refresh() {
  const streak = getStreak();
  document.getElementById('streak-text').textContent = streak;
  document.getElementById('ms-streak').textContent = streak;
  
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
  
  // Mini stats
  document.getElementById('ms-total').textContent = S.workouts.length;
  document.getElementById('ms-week').textContent = S.workouts.filter(w=>new Date(w.date+'T12:00:00')>=ws).length;
  
  // Widgets
  const prMap={};
  S.workouts.flatMap(w=>w.exercises).forEach(e=>{if(!prMap[e.ex]||e.reps>prMap[e.ex])prMap[e.ex]=e.reps;});
  document.getElementById('w-pr').textContent = Object.keys(prMap).length;
  document.getElementById('w-tpl').textContent = S.templates.length;
  
  const volMap={};
  S.workouts.flatMap(w=>w.exercises).forEach(e=>{volMap[e.ex]=(volMap[e.ex]||0)+(e.isTime?0:e.sets*e.reps);});
  const topEx = Object.entries(volMap).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('w-vol').textContent = topEx ? topEx[1] : '—';
  
  // Calendário widget
  const histCount = S.workouts.length + S.restDays.length;
  document.getElementById('w-cal').textContent = histCount > 0 ? histCount : '—';
  
  renderWeekStrip();
  renderAI();
}

function renderWeekStrip() {
  const days=['D','S','T','Q','Q','S','S'];
  const now=new Date(); const weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const strip=document.getElementById('week-strip');
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(weekStart); d.setDate(weekStart.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const w=S.workouts.find(x=>x.date===ds); const r=S.restDays.find(x=>x.date===ds);
    const isToday=ds===today();
    let bubble='wd-bubble';
    if(w) bubble+=' has-workout';
    else if(r) bubble+=' rest';
    if(isToday) bubble+=' today';
    html+=`<div class="wd"><div class="${bubble}">${days[i]}</div></div>`;
  }
  strip.innerHTML=html;
}

function renderCal() {
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-title').textContent = months[calMonth] + ' ' + calYear;
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prefix = calYear+'-'+String(calMonth+1).padStart(2,'0');
  const todayStr = today();
  
  let grid = '';
  for (let i=0; i<firstDow; i++) grid += '<div></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const ds = prefix+'-'+String(d).padStart(2,'0');
    const w=S.workouts.find(x=>x.date===ds);
    const r=S.restDays.find(x=>x.date===ds);
    let cls = 'cal-cell';
    if (ds === todayStr) cls += ' today';
    if (w) cls += ' workout';
    else if (r) cls += ' rest';
    grid += `<div class="${cls}" onclick="showDayDetail('${ds}')" style="cursor:pointer">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = grid;
}

function openPRModal() {
  const prMap={};
  S.workouts.forEach(w=>w.exercises.forEach(e=>{if(!e.isTime&&(!prMap[e.ex]||e.reps>prMap[e.ex]))prMap[e.ex]=e.reps;}));
  const prs = Object.entries(prMap).sort((a,b)=>b[1]-a[1]);
  
  if(!prs.length){
    createModal('prModal', '🏆 Records', '<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-title">Nenhum record ainda</div></div>');
    return;
  }
  
  let html = '<div class="pr-list">';
  prs.forEach(([ex,reps])=>{
    html += `<div class="pr-item"><div class="pr-name">${ex}</div><div class="pr-val">${reps}</div></div>`;
  });
  html += '</div>';
  createModal('prModal', '🏆 Records', html);
}

function openChartsModal() {
  createModal('chartsModal', '📈 Evolução', `
    <div style="text-align:center;padding:40px;color:var(--t3)">
      <div style="font-size:32px;margin-bottom:12px">📈</div>
      <div>Gráfico em desenvolvimento</div>
    </div>
  `);
}

function openVolumeModal() {
  const volMap={};
  S.workouts.forEach(w=>w.exercises.forEach(e=>{volMap[e.ex]=(volMap[e.ex]||0)+(e.isTime?0:e.sets*e.reps);}));
  const sorted = Object.entries(volMap).sort((a,b)=>b[1]-a[1]);
  
  if(!sorted.length){
    createModal('volModal', '📊 Volume', '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Sem dados ainda</div></div>');
    return;
  }
  
  let html = '<div style="display:flex;flex-direction:column;gap:10px">';
  sorted.slice(0,10).forEach(([ex,vol])=>{
    const max = sorted[0][1];
    const pct = Math.round((vol/max)*100);
    html += `<div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px">${ex}</span><span style="font-size:13px;color:var(--t3)">${vol}</span></div><div style="height:6px;background:var(--card2);border-radius:3px"><div style="height:100%;width:${pct}%;background:var(--primary);border-radius:3px"></div></div></div>`;
  });
  html += '</div>';
  createModal('volModal', '📊 Volume por Exercício', html);
}

// ================================================================
// HISTORY MODAL
// ================================================================
function openHistoryModal() {
  createModal('historyModal', '📜 Histórico', '<div id="history-modal-list" style="animation:fadeInUp 0.3s ease-out"></div>');
  renderHistoryInModal();
}

function renderHistoryInModal() {
  const el = document.getElementById('history-modal-list');
  if (!el) return;
  const wMap={},rMap={};
  S.workouts.forEach(w=>wMap[w.date]=w);
  S.restDays.forEach(r=>rMap[r.date]=r);
  const dates=[...new Set([...Object.keys(wMap),...Object.keys(rMap)])].sort().reverse();
  if (!dates.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-title">Nenhum registro ainda</div></div>'; return; }
  
  el.innerHTML = dates.slice(0,40).map(date=>{
    const d=new Date(date+'T12:00:00');
    const lbl=d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    if(rMap[date]&&!wMap[date]){
      return `<div class="hist-item" style="animation:fadeInUp 0.3s ease-out">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="hist-date">${lbl}</span>
          <button style="background:none;border:none;font-size:16px;cursor:pointer" onclick="deleteWorkout('${date}')">🗑️</button>
        </div>
        <div style="font-size:13px;color:var(--t3)">😴 Descanso</div>
      </div>`;
    }
    const w=wMap[date];
    const vol=w.exercises.reduce((a,e)=>a+(e.isTime?0:e.sets*e.reps),0);
    const muscles=[...new Set(w.exercises.map(e=>e.muscle))];
    const exList=[...new Set(w.exercises.map(e=>e.ex))];
    return `<div class="hist-item" style="animation:fadeInUp 0.3s ease-out">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="hist-date">${lbl}</span>
        <div style="display:flex;gap:4px">
          <button style="background:var(--card);border:none;padding:6px 10px;border-radius:8px;font-size:14px;cursor:pointer" onclick="openEditWorkout('${date}')">✏️</button>
          <button style="background:rgba(255,69,58,.1);border:none;padding:6px 10px;border-radius:8px;font-size:14px;cursor:pointer" onclick="deleteWorkout('${date}')">🗑️</button>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0">${muscles.map(m=>`<span class="ex-badge badge-${m}">${MUSCLE_LABEL[m]}</span>`).join('')}</div>
      <div style="font-size:12px;color:var(--t3)">${exList.slice(0,4).join(', ')}${exList.length>4?'...':''}</div>
      <div style="font-size:11px;color:var(--primary);margin-top:4px">${vol} reps</div>
    </div>`;
  }).join('');
}

function deleteWorkout(date) {
  if(!confirm(`Apagar registro de ${date}?`)) return;
  S.workouts=S.workouts.filter(w=>w.date!==date);
  S.restDays=S.restDays.filter(r=>r.date!==date);
  save(); refresh(); renderHistoryInModal(); renderWeekStrip(); toast('Registro removido','#ff453a');
}

// ================================================================
// EDIT WORKOUT
// ================================================================
function openEditWorkout(date) {
  const workout = S.workouts.find(w=>w.date===date);
  if (!workout) return;
  
  const modalEl = createModal('editModal', '✏️ Editar Treino', `
    <div id="edit-ex-list"></div>
    <button class="btn-primary" style="margin-top:12px" onclick="addExerciseToEditModal('${date}')">➕ Adicionar exercício</button>
  `);
  
  function refreshEdit() {
    const w = S.workouts.find(w=>w.date===date);
    const listDiv = document.getElementById('edit-ex-list');
    if (!w||!listDiv) return;
    listDiv.innerHTML = w.exercises.map((ex,i)=>`
      <div style="background:var(--card2);border-radius:12px;padding:14px;margin-bottom:10px;animation:fadeInUp 0.2s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-weight:600">${ex.ex}</span>
          <span class="ex-badge badge-${ex.muscle}">${MUSCLE_LABEL[ex.muscle]}</span>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <div style="flex:1"><label style="font-size:10px;color:var(--t3)">Séries</label><input type="number" id="edit_sets_${i}" value="${ex.sets}" style="width:100%;padding:8px;background:var(--card);border:none;border-radius:8px;font-size:16px;font-weight:600"></div>
          <div style="flex:1"><label style="font-size:10px;color:var(--t3)">Reps</label><input type="number" id="edit_reps_${i}" value="${ex.reps}" style="width:100%;padding:8px;background:var(--card);border:none;border-radius:8px;font-size:16px;font-weight:600"></div>
        </div>
        <div style="display:flex;gap:8px">
          <button style="flex:1;padding:10px;background:var(--primary);color:#000;border:none;border-radius:10px;font-weight:600;cursor:pointer" onclick="saveEditExercise('${date}',${i})">✓ Salvar</button>
          <button style="flex:1;padding:10px;background:rgba(255,69,58,.15);color:var(--red);border:none;border-radius:10px;font-weight:600;cursor:pointer" onclick="deleteEditExercise('${date}',${i})">🗑️</button>
        </div>
      </div>
    `).join('');
    if (!w.exercises.length) listDiv.innerHTML='<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-title">Nenhum exercício</div></div>';
  }
  refreshEdit();
  
  window.saveEditExercise=(date,idx)=>{
    const w=S.workouts.find(w=>w.date===date); if(!w)return;
    const newSets=parseInt(document.getElementById(`edit_sets_${idx}`).value)||1;
    const newReps=parseInt(document.getElementById(`edit_reps_${idx}`).value)||1;
    w.exercises[idx]={...w.exercises[idx],sets:newSets,reps:newReps};
    save(); refreshEdit(); refresh(); toast('Atualizado!','#30d158');
  };
  window.deleteEditExercise=(date,idx)=>{
    if(!confirm('Remover exercício?'))return;
    const w=S.workouts.find(w=>w.date===date); if(!w)return;
    w.exercises.splice(idx,1);
    if(!w.exercises.length) S.workouts=S.workouts.filter(w=>w.date!==date);
    save(); refreshEdit(); refresh(); renderHistoryInModal(); toast('Removido','#ff9f0a');
  };
  
  window.addExerciseToEditModal=(date)=>{
    const w=S.workouts.find(w=>w.date===date); if(!w)return;
    createModal('addExEditModal', 'Adicionar Exercício', `
      <div class="field"><label>Exercício</label>
        <select id="edit-ex-select" style="width:100%;padding:12px;background:var(--card2);border:none;border-radius:12px;font-size:15px;color:var(--t1)">
          <option value="">Selecionar...</option>
          <optgroup label="Push 💪"><option>Flexão (Push-up)</option><option>Flexão diamante</option><option>Pike push-up</option><option>Paralela (Dip)</option></optgroup>
          <optgroup label="Pull 🦾"><option>Barra fixa (Pull-up)</option><option>Barra supinada (Chin-up)</option><option>Australian pull-up</option></optgroup>
          <optgroup label="Legs 🦵"><option>Agachamento (Squat)</option><option>Afundo (Lunge)</option></optgroup>
          <optgroup label="Core 🧘"><option>Prancha (Plank)</option><option>Hanging leg raise</option></optgroup>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div class="field" style="flex:1"><label>Séries</label><input type="number" id="edit-new-sets" value="3" style="width:100%;padding:12px;background:var(--card2);border:none;border-radius:12px;font-size:16px;font-weight:600"></div>
        <div class="field" style="flex:1"><label>Reps</label><input type="number" id="edit-new-reps" value="10" style="width:100%;padding:12px;background:var(--card2);border:none;border-radius:12px;font-size:16px;font-weight:600"></div>
      </div>
      <div class="muscle-selector" id="edit-new-muscle" style="margin-bottom:16px">
        <div class="muscle-option" onclick="selectMuscleEdit('push',this)">Push</div>
        <div class="muscle-option" onclick="selectMuscleEdit('pull',this)">Pull</div>
        <div class="muscle-option" onclick="selectMuscleEdit('legs',this)">Legs</div>
        <div class="muscle-option active" onclick="selectMuscleEdit('core',this)">Core</div>
      </div>
      <button class="btn-primary" onclick="confirmAddToEdit('${date}')">Adicionar</button>
    `);
    window.selectMuscleEdit=(muscle,el)=>{
      document.querySelectorAll('#edit-new-muscle .muscle-option').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
      window.newMuscleEdit = muscle;
    };
    window.newMuscleEdit = 'core';
    window.confirmAddToEdit=(date)=>{
      const ex=document.getElementById('edit-ex-select').value;
      const sets=parseInt(document.getElementById('edit-new-sets').value)||1;
      const reps=parseInt(document.getElementById('edit-new-reps').value)||1;
      if(!ex){toast('Selecione um exercício','#ff453a');return;}
      const w=S.workouts.find(w=>w.date===date); if(!w)return;
      w.exercises.push({ex,sets,reps,isTime:false,notes:'',muscle:window.newMuscleEdit,ts:Date.now()});
      save(); refresh(); refreshEdit(); document.getElementById('addExEditModal').remove(); toast('Adicionado!','#30d158');
    };
  };
}

// TEMPLATES MODAL
// ================================================================
function openTemplatesModal() {
  createModal('templatesModal', '📋 Templates', `
    <div id="tpl-modal-list" style="animation:fadeInUp 0.3s ease-out"></div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--sep)">
      <div style="font-size:14px;font-weight:600;margin-bottom:10px">Salvar treino atual como template</div>
      <div class="field"><label>Nome</label><input type="text" id="tpl-name-input" placeholder="Ex: Pull Day..." style="width:100%;padding:12px;background:var(--card2);border:none;border-radius:12px;font-size:15px;color:var(--t1)"></div>
      <button class="btn-primary" onclick="saveTemplate()">Salvar template</button>
    </div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--sep)">
      <div style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:10px">Usar template retroativo</div>
      <div class="field"><label>Data do treino</label><input type="date" id="template-date-input" value="${today()}" max="${today()}" min="2024-01-01" style="width:100%;padding:12px;background:var(--card2);border:none;border-radius:12px;font-size:15px;color:var(--t1)"></div>
      <div style="font-size:11px;color:var(--orange);margin-top:4px">⏰ Use para registrar treinos passados</div>
    </div>
  `);
  renderTemplatesInModal();
}

function renderTemplatesInModal() {
  const el = document.getElementById('tpl-modal-list');
  if (!el) return;
  if (!S.templates.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Nenhum template salvo</div></div>';
    return;
  }
  el.innerHTML = S.templates.map((t,i)=>`
    <div style="background:var(--card2);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;animation:fadeInUp 0.3s ease-out">
      <div>
        <div style="font-weight:600">${t.name}</div>
        <div style="font-size:12px;color:var(--t3)">${[...new Set(t.exercises.map(e=>e.ex))].slice(0,3).join(', ')}${t.exercises.length>3?'...':''}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button style="background:var(--primary);color:#000;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer" onclick="useTemplate(${i})">Usar</button>
        <button style="background:var(--card);border:none;padding:8px;border-radius:8px;font-size:14px;cursor:pointer" onclick="useTemplateRetroactive(${i})">📅</button>
        <button style="background:rgba(255,69,58,.1);border:none;padding:8px;border-radius:8px;font-size:14px;cursor:pointer" onclick="deleteTemplate(${i})">🗑️</button>
      </div>
    </div>
  `).join('');
}

function saveTemplate() {
  const name = document.getElementById('tpl-name-input').value.trim();
  if (!name) { toast('Digite um nome','#ff453a'); return; }
  const exercises = S.todayExercises.length ? S.todayExercises : (S.workouts.length ? S.workouts[S.workouts.length-1].exercises : []);
  if (!exercises.length) { toast('Adicione exercícios primeiro.','#ff453a'); return; }
  S.templates.push({name, exercises:[...exercises]});
  save(); renderTemplatesInModal(); document.getElementById('tpl-name-input').value = ''; refresh();
  toast('Template salvo!','#30d158');
}

function useTemplate(idx) {
  S.todayExercises = [...S.templates[idx].exercises.map(e=>({...e,ts:Date.now()}))];
  save(); refresh(); document.getElementById('templatesModal').remove();
  toast(`Template "${S.templates[idx].name}" adicionado!`,'#30d158');
}

function useTemplateRetroactive(idx) {
  const selectedDate = document.getElementById('template-date-input').value || today();
  if (!selectedDate) { toast('Selecione uma data','#ff453a'); return; }
  const template = S.templates[idx];
  const exercises = template.exercises.map(e=>({...e,ts:Date.now(),date:selectedDate}));
  const existing = S.workouts.find(w=>w.date===selectedDate);
  if (existing) {
    existing.exercises.push(...exercises);
    toast(`✅ Adicionado ao treino de ${selectedDate}!`,'#30d158');
  } else {
    S.workouts.push({date:selectedDate, exercises});
    toast(`✅ Treino criado em ${selectedDate}!`,'#30d158');
  }
  save(); refresh(); renderWeekStrip();
}

function deleteTemplate(i) {
  if (!confirm('Remover template?')) return;
  S.templates.splice(i,1); save(); renderTemplatesInModal(); refresh();
  toast('Template removido','#ff9f0a');
}

// ================================================================
// PROGRESS MODAL
// ================================================================
function openProgressModal() {
  const streak = getStreak();
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate()-now.getDay());
  const weekCount = S.workouts.filter(w=>new Date(w.date+'T12:00:00')>=ws).length;
  const mo = now.toISOString().slice(0,7);
  const mReps = S.workouts.filter(w=>w.date.startsWith(mo)).reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+(e.isTime?0:e.sets*e.reps),0),0);
  
  const prMap={};
  S.workouts.forEach(w=>w.exercises.forEach(e=>{if(!e.isTime&&(!prMap[e.ex]||e.reps>prMap[e.ex]))prMap[e.ex]=e.reps;}));
  const prCount = Object.keys(prMap).length;
  
  const totalVol = S.workouts.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+(e.isTime?0:e.sets*e.reps),0),0);
  
  createModal('progressModal', '🎯 Progresso', `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;animation:fadeInUp 0.3s ease-out">
      <div style="background:var(--card2);border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--primary)">${S.workouts.length}</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Total</div>
      </div>
      <div style="background:var(--card2);border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--blue)">${weekCount}</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Esta semana</div>
      </div>
      <div style="background:var(--card2);border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--orange)">${streak}</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Dias streak</div>
      </div>
      <div style="background:var(--card2);border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--purple)">${mReps}</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Reps/mês</div>
      </div>
      <div style="background:var(--card2);border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--cyan)">${prCount}</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Records</div>
      </div>
      <div style="background:var(--card2);border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--primary)">${Math.round(totalVol/1000)}k</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Volume total</div>
      </div>
    </div>
  `);
}

// Init
refresh();

// ================================================================
// EXPORT / IMPORT
// ================================================================
function exportToFile() {
  try {
    const dataStr = JSON.stringify(S, null, 2);
    const filename = `ren_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('📁 Backup exportado!', '#30d158');
  } catch(e) {
    const dataStr = JSON.stringify(S, null, 2);
    const filename = `ren_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('📁 Backup exportado!', '#30d158');
  }
}

function importFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported && (Array.isArray(imported.workouts) || Array.isArray(imported.restDays) || Array.isArray(imported.templates))) {
        if (confirm('Substituir todos os dados atuais? Esta ação não pode ser desfeita.')) {
          S = imported;
          if (!S.workouts) S.workouts = [];
          if (!S.restDays) S.restDays = [];
          if (!S.templates) S.templates = [];
          if (!S.todayExercises) S.todayExercises = [];
          save();
          refresh();
          toast('📥 Dados importados!', '#30d158');
        }
      } else {
        toast('❌ Arquivo inválido', '#ff453a');
      }
    } catch(e) {
      toast('❌ Erro ao ler arquivo', '#ff453a');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}
